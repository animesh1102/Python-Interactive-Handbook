<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Handbook — Interactive Edition ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#f06292;--pink-light:#fce4ec;--pink-mid:#f48fb1;
  --purple:#9c27b0;--purple-light:#f3e5f5;--purple-mid:#ce93d8;
  --lavender:#7986cb;--lavender-light:#e8eaf6;
  --green:#43a047;--green-light:#e8f5e9;
  --amber:#f57c00;--amber-light:#fff8e1;
  --red:#e53935;--red-light:#ffebee;
  --text:#2d2d2d;--muted:#757575;--border:#e0d7f0;
  --card:#fff;--page:#fdf6ff;
  --code-bg:#f8f4ff;--sidebar:#fff;
}
body{font-family:'Nunito',sans-serif;background:var(--page);color:var(--text);font-size:15px;line-height:1.65;display:flex;flex-direction:column;min-height:100vh}

/* ── Header ── */
header{background:linear-gradient(135deg,#e91e8c,#9c27b0,#5c6bc0);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.18)}
header h1{color:#fff;font-size:1.15em;font-weight:800;letter-spacing:.01em}
header span{color:rgba(255,255,255,.75);font-size:.85em}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.progress-pill{background:rgba(255,255,255,.2);color:#fff;border-radius:20px;padding:4px 12px;font-size:.8em;font-weight:700}

/* ── Layout ── */
.app{display:flex;flex:1;overflow:hidden;height:calc(100vh - 54px)}

/* ── Sidebar ── */
.sidebar{width:250px;min-width:250px;background:var(--sidebar);border-right:1.5px solid var(--border);overflow-y:auto;padding:12px 0}
.sidebar-section{padding:6px 16px 2px;font-size:.7em;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--purple);margin-top:6px}
.chapter-btn{width:100%;text-align:left;padding:8px 16px 8px 20px;border:none;background:transparent;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.85em;font-weight:600;color:var(--muted);border-left:3px solid transparent;transition:all .15s;position:relative;display:flex;align-items:center;gap:8px}
.chapter-btn:hover{background:var(--purple-light);color:var(--purple)}
.chapter-btn.active{background:var(--pink-light);color:var(--pink);border-left-color:var(--pink);font-weight:800}
.chapter-btn.done .ch-icon{color:var(--green)}
.ch-icon{font-size:1em;min-width:16px}
.ch-num{font-size:.75em;background:var(--lavender-light);color:var(--lavender);border-radius:10px;padding:1px 6px;font-weight:700}

/* ── Main content ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* ── Lesson panel ── */
.lesson-panel{padding:32px 40px 24px;max-width:780px;width:100%}
.lesson-header{margin-bottom:20px}
.lesson-tag{display:inline-block;background:linear-gradient(135deg,#e91e8c,#9c27b0);color:#fff;border-radius:20px;padding:3px 12px;font-size:.75em;font-weight:800;margin-bottom:8px}
.lesson-title{font-size:1.6em;font-weight:800;color:#1a1a1a;line-height:1.2;margin-bottom:4px}
.lesson-subtitle{color:var(--muted);font-size:.9em}
.lesson-objectives{background:linear-gradient(135deg,var(--lavender-light),var(--purple-light));border-left:4px solid var(--lavender);border-radius:0 10px 10px 0;padding:14px 18px;margin:18px 0;font-size:.9em}
.lesson-objectives strong{color:var(--lavender);display:block;margin-bottom:6px;font-size:.85em;text-transform:uppercase;letter-spacing:.06em}
.lesson-objectives ul{padding-left:1.2em}
.lesson-objectives li{margin:3px 0}
.lesson-body p{margin-bottom:.9em}
.lesson-body h3{font-size:1.05em;font-weight:800;color:var(--purple);margin:22px 0 8px;padding-bottom:4px;border-bottom:2px dashed var(--border)}
.lesson-body h3::before{content:"✿ ";color:var(--pink-mid)}
.lesson-body strong{color:var(--purple)}
.lesson-body ul,
.lesson-body ol{padding-left:1.4em;margin:.4em 0 .9em}
.lesson-body li{margin:3px 0}
.lesson-body li::marker{color:var(--pink)}

/* ── Code block ── */
.code-block{background:var(--code-bg);border:1.5px solid var(--border);border-left:4px solid var(--purple-mid);border-radius:10px;margin:14px 0;overflow:hidden}
.code-label{background:linear-gradient(90deg,var(--purple-light),var(--lavender-light));padding:6px 14px;font-size:.72em;font-weight:800;color:var(--purple);text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border)}
.code-label::before{content:"💻"}
pre.code-content{padding:14px 16px;font-family:'Source Code Pro',monospace;font-size:.83em;line-height:1.6;color:#1a1a1a;overflow-x:auto;background:transparent}
pre.code-content .kw{color:#6a1b9a;font-weight:700}
pre.code-content .st{color:#2e7d32}
pre.code-content .nm{color:#c62828}
pre.code-content .cm{color:#9e9e9e;font-style:italic}
pre.code-content .fn{color:#ad1457}
pre.code-content .bi{color:#5c1a8a}

/* ── Info box ── */
.info-box{border-radius:10px;padding:12px 16px;margin:14px 0;font-size:.9em;display:flex;gap:10px;align-items:flex-start}
.info-box.tip{background:var(--amber-light);border:1px solid #ffe082}
.info-box.note{background:var(--lavender-light);border:1px solid var(--lavender)}
.info-box.warning{background:var(--red-light);border:1px solid #ef9a9a}
.info-icon{font-size:1.2em;min-width:20px}

/* ── Divider ── */
.lesson-divider{border:none;text-align:center;color:var(--pink-mid);font-size:1em;letter-spacing:.4em;margin:20px 0}
.lesson-divider::before{content:"✦ ✿ ✦"}

/* ── Quiz section ── */
.quiz-section{background:linear-gradient(135deg,#fce4ec,#f3e5f5);border:2px solid var(--pink-mid);border-radius:16px;padding:22px 26px;margin:24px 0}
.quiz-title{font-size:1em;font-weight:800;color:var(--pink);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.quiz-subtitle{font-size:.85em;color:var(--muted);margin-bottom:18px}
.quiz-q{font-weight:700;margin-bottom:12px;font-size:.95em}
.quiz-options{display:flex;flex-direction:column;gap:8px}
.quiz-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;background:#fff;font-size:.9em;font-weight:600;text-align:left}
.quiz-opt:hover{border-color:var(--purple-mid);background:var(--purple-light)}
.quiz-opt.correct{border-color:var(--green);background:var(--green-light);color:var(--green)}
.quiz-opt.wrong{border-color:var(--red);background:var(--red-light);color:var(--red)}
.quiz-opt-letter{width:26px;height:26px;border-radius:50%;background:var(--purple-light);color:var(--purple);font-weight:800;font-size:.8em;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.quiz-feedback{margin-top:14px;padding:10px 14px;border-radius:10px;font-size:.88em;font-weight:700;display:none}
.quiz-feedback.show{display:block}
.quiz-feedback.good{background:var(--green-light);color:var(--green)}
.quiz-feedback.bad{background:var(--red-light);color:var(--red)}

/* ── Try it editor ── */
.editor-section{background:var(--code-bg);border:2px solid var(--purple-mid);border-radius:14px;margin:20px 0;overflow:hidden}
.editor-header{background:linear-gradient(90deg,var(--purple-light),var(--lavender-light));padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.editor-title{font-weight:800;color:var(--purple);font-size:.9em;display:flex;align-items:center;gap:8px}
.run-btn{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:20px;padding:6px 18px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.82em;cursor:pointer;transition:transform .1s}
.run-btn:hover{transform:scale(1.03)}
.run-btn:active{transform:scale(.97)}
.code-editor{width:100%;min-height:100px;font-family:'Source Code Pro',monospace;font-size:.83em;background:transparent;border:none;border-top:1px solid var(--border);padding:14px 16px;resize:vertical;outline:none;color:#1a1a1a;line-height:1.6}
.output-box{border-top:1px solid var(--border);padding:12px 16px;font-family:'Source Code Pro',monospace;font-size:.82em;min-height:40px;color:#1a1a1a;white-space:pre-wrap}
.output-label{font-size:.7em;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px;font-family:'Nunito',sans-serif}
.output-box.has-output{background:#fff}
.output-box.error{color:var(--red);background:var(--red-light)}

/* ── AI Tutor ── */
.ai-section{border-top:2px dashed var(--border);padding:20px 40px 32px;max-width:780px}
.ai-title{font-weight:800;color:var(--purple);margin-bottom:12px;display:flex;align-items:center;gap:8px;font-size:.95em}
.ai-messages{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;max-height:280px;overflow-y:auto}
.ai-msg{padding:10px 14px;border-radius:12px;font-size:.88em;line-height:1.55;max-width:90%}
.ai-msg.tutor{background:linear-gradient(135deg,var(--pink-light),var(--purple-light));border-bottom-left-radius:4px;align-self:flex-start}
.ai-msg.user{background:linear-gradient(135deg,var(--lavender-light),var(--purple-light));border-bottom-right-radius:4px;align-self:flex-end;text-align:right}
.ai-msg.loading{background:var(--purple-light);color:var(--muted);font-style:italic}
.ai-input-row{display:flex;gap:8px}
.ai-input{flex:1;border:2px solid var(--border);border-radius:20px;padding:9px 16px;font-family:'Nunito',sans-serif;font-size:.88em;outline:none;background:#fff;transition:border-color .15s}
.ai-input:focus{border-color:var(--purple-mid)}
.ai-send-btn{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:20px;padding:9px 18px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.82em;cursor:pointer;white-space:nowrap}
.quick-asks{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.quick-ask-btn{background:var(--purple-light);color:var(--purple);border:none;border-radius:20px;padding:5px 12px;font-family:'Nunito',sans-serif;font-size:.78em;font-weight:700;cursor:pointer;transition:all .15s}
.quick-ask-btn:hover{background:var(--purple-mid);color:#fff}

/* ── Bottom nav ── */
.bottom-nav{padding:16px 40px 24px;display:flex;justify-content:space-between;align-items:center;max-width:780px;border-top:1.5px solid var(--border)}
.nav-btn{padding:10px 22px;border-radius:24px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.88em;cursor:pointer;border:2px solid var(--border);background:#fff;color:var(--muted);transition:all .15s}
.nav-btn:hover{border-color:var(--purple-mid);color:var(--purple);background:var(--purple-light)}
.nav-btn.primary{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border-color:transparent}
.nav-btn.primary:hover{opacity:.92}
.chapter-progress{font-size:.82em;color:var(--muted);font-weight:600}

/* ── Welcome screen ── */
.welcome{padding:48px 40px;max-width:700px}
.welcome h2{font-size:1.8em;font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,#e91e8c,#9c27b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.welcome p{color:var(--muted);margin-bottom:24px;font-size:.95em}
.welcome-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
.welcome-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:16px;text-align:center}
.welcome-card .icon{font-size:2em;margin-bottom:8px}
.welcome-card h3{font-size:.9em;font-weight:800;color:var(--purple);margin-bottom:4px}
.welcome-card p{font-size:.8em;color:var(--muted)}
.start-btn{background:linear-gradient(135deg,#e91e8c,#9c27b0);color:#fff;border:none;border-radius:28px;padding:14px 36px;font-family:'Nunito',sans-serif;font-weight:800;font-size:1em;cursor:pointer;box-shadow:0 4px 16px rgba(156,39,176,.3);transition:transform .15s}
.start-btn:hover{transform:translateY(-2px)}

table{border-collapse:collapse;width:100%;margin:12px 0;font-size:.88em}
th{background:linear-gradient(90deg,#e91e8c,#9c27b0);color:#fff;padding:8px 12px;text-align:left}
td{padding:6px 12px;border-bottom:1px solid var(--border)}
tr:nth-child(even) td{background:var(--pink-light)}

.sparkle{animation:sparkle 1.5s ease-in-out infinite alternate}
@keyframes sparkle{from{opacity:.7}to{opacity:1}}
</style>
</head>

<script>
// ── State ──
let currentChapter = -1;
let completedChapters = new Set(JSON.parse(localStorage.getItem('py_done') || '[]'));
let aiHistory = [];

// ── Chapter data ──
const chapters = {
  0: {
    title: "Welcome! 🌸",
    subtitle: "Your Python learning adventure starts here",
    tag: "Start Here",
    isWelcome: true
  },
  1: {
    title: "What Is Programming?",
    subtitle: "Understanding what code actually is",
    tag: "Chapter 1",
    objectives: ["Explain what a program is","Describe how a computer follows instructions","Understand the difference between hardware and software","Explain why Python is a good first language"],
    sections: [
      {heading:"The Core Idea", content:`A <strong>program</strong> is a set of instructions that tells a computer exactly what to do, one step at a time. Computers are very fast but very literal — they do precisely what you tell them, nothing more.

Think of a recipe. A recipe is a list of steps: "mix flour and butter", "bake at 180°C for 25 minutes". A program is the same idea — a list of steps for the computer to follow.`},
      {heading:"Why Python?", content:`Python was designed to be readable. Compare these two ways of saying the same thing:

In some languages you'd write a lot of boilerplate code just to say hello. In Python, it's simply:<br><br>
<code>print("Hello, world!")</code><br><br>
That's it. Python reads almost like English, which makes it perfect for beginners — and it's also used by NASA, Instagram, and Netflix in real production systems.`},
      {heading:"What Can Python Do?", content:`Python is used everywhere:
<ul><li>🌐 Building websites (Instagram, Pinterest)</li><li>🤖 AI and machine learning (ChatGPT uses Python)</li><li>🚀 Space engineering and simulations</li><li>📊 Data analysis and science</li><li>🎮 Games and automation scripts</li></ul>`}
    ],
    code: {label:"Your first Python program", starter:`# This is your first program! 🎉
# Lines starting with # are comments — Python ignores them.
# They're notes for humans.

print("Hello, world!")
print("My name is Python! 🐍")
print(2 + 2)  # Python can do maths too!`},
    quiz: {
      q: "What is a program?",
      opts:["A type of computer hardware","A set of instructions telling a computer what to do","A programming language","A type of software app"],
      correct:1,
      explanation:"Correct! ✨ A program is a set of instructions. Hardware is the physical computer; Python is the language we write programs in."
    }
  },
  2: {
    title: "How Python Works",
    subtitle: "Under the hood of the Python interpreter",
    tag: "Chapter 2",
    objectives:["Describe what happens when Python runs a program","Understand what the Python interpreter is","Know what source code and bytecode mean"],
    sections:[
      {heading:"The Interpreter", content:`When you write Python code, you're writing instructions in a human-readable language. But computers only understand machine code — binary 1s and 0s.

Python solves this with an <strong>interpreter</strong>: a program that reads your Python code line by line and converts it into instructions the computer can run, right as it goes.`},
      {heading:"What happens when you run a .py file", content:`Here's the journey your code takes:<br><br>
<strong>1.</strong> You write <code>hello.py</code> (this is your <em>source code</em>)<br>
<strong>2.</strong> Python reads and checks your code for syntax errors<br>
<strong>3.</strong> Python compiles it to <em>bytecode</em> (a faster intermediate format)<br>

// ── Pyodide-like fake runner ──
function runCode(code, outputEl) {
  outputEl.className = 'output-box';
  outputEl.textContent = '';
  
  const outputs = [];
  const fakePrint = (...args) => { outputs.push(args.map(a=>String(a)).join(' ')); };
  
  // very limited safe execution via Function
  try {
    // We intercept print() calls by replacing them before eval
    let transformed = code
      .replace(/^#.*$/gm, '') // strip comments
      .replace(/\binput\s*\(/g, 'fakeinput(');
    
    let result = null;
    const fn = new Function('print','fakeinput',transformed);
    fn(fakePrint, (prompt)=>{ outputs.push(prompt+'[user input not available in browser]'); return ''; });
    
    if(outputs.length === 0 && code.trim()){
      outputEl.textContent = '(no output — make sure you used print()!)';
    } else {
      outputEl.textContent = outputs.join('\n');
      outputEl.classList.add('has-output');
    }
  } catch(e) {
    outputEl.textContent = '❌ ' + e.message;
    outputEl.classList.add('error');
  }
}

// ── AI Tutor ──
async function askTutor(question, chapterTitle) {
  const messagesEl = document.getElementById('ai-messages');
  const userMsg = document.createElement('div');
  userMsg.className = 'ai-msg user';
  userMsg.textContent = question;
  messagesEl.appendChild(userMsg);

  const loadingMsg = document.createElement('div');
  loadingMsg.className = 'ai-msg tutor loading';
  loadingMsg.textContent = '✨ thinking…';
  messagesEl.appendChild(loadingMsg);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  aiHistory.push({role:'user', content: question});

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system: `You are Pyra, a fun, encouraging Python tutor for teen girls inside an interactive handbook. The student is currently on: "${chapterTitle}". 
Keep answers SHORT (2-5 sentences max). Use a warm, friendly tone with an occasional emoji. Give clear Python examples when helpful. Never be condescending. If they're stuck, break it into tiny steps. Use simple language.`,
        messages: aiHistory
      })
    });
    const data = await resp.json();
    const reply = data.content?.[0]?.text || "Hmm, I couldn't connect. Try again!";
    
    aiHistory.push({role:'assistant', content: reply});
    loadingMsg.remove();
    
    const tutorMsg = document.createElement('div');
    tutorMsg.className = 'ai-msg tutor';
    tutorMsg.innerHTML = reply.replace(/`([^`]+)`/g,'<code>$1</code>');
    messagesEl.appendChild(tutorMsg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  } catch(e) {
    loadingMsg.textContent = '⚠️ Couldn\'t connect. Check your internet and try again!';
    loadingMsg.classList.remove('loading');
  }
}

    chData.sections.forEach(s=>{
      html += `<h3>${s.heading}</h3><p>${s.content}</p>`;
    });
  }
  html += '</div>';

  // Code editor
  if(chData.code){
    html += `<hr class="lesson-divider">
    <div class="editor-section">
      <div class="editor-header">
        <div class="editor-title">✏️ Try it yourself</div>
        <button class="run-btn" onclick="runCode(document.getElementById('code-ta').value, document.getElementById('code-out'))">▶ Run</button>
      </div>
      <textarea class="code-editor" id="code-ta" spellcheck="false">${chData.code.starter.trim()}</textarea>
      <div style="padding:8px 16px;background:#fff;border-top:1px solid var(--border)">
        <div class="output-label">Output</div>
        <div class="output-box" id="code-out">Press ▶ Run to see output</div>
      </div>
    </div>`;
  }

  // Quiz
  if(chData.quiz){
    html += `<hr class="lesson-divider">
    <div class="quiz-section">
      <div class="quiz-title">🧠 Quick Check</div>
      <div class="quiz-subtitle">Answer to unlock the next chapter!</div>
      <div class="quiz-q">${chData.quiz.q}</div>
      <div class="quiz-options">
        ${chData.quiz.opts.map((o,i)=>`
          <button class="quiz-opt" onclick="checkAnswer(${i}, ${chData.quiz.correct}, '${chData.quiz.explanation.replace(/'/g,"\\'")}', ${ch})">
            <span class="quiz-opt-letter">${String.fromCharCode(65+i)}</span>${o}
          </button>`).join('')}
      </div>
      <div class="quiz-feedback" id="quiz-feedback"></div>
    </div>`;
  }

  panel.innerHTML = html;
  main.appendChild(panel);

  // AI tutor
  const aiSection = document.createElement('div');
  aiSection.className = 'ai-section';
  aiHistory = []; // reset per chapter
  aiSection.innerHTML = `
    <div class="ai-title">💜 Ask Pyra — your AI tutor</div>
    <div class="quick-asks">
      <button class="quick-ask-btn" onclick="sendQuick('Can you explain this chapter in simpler terms?')">Simpler explanation</button>
      <button class="quick-ask-btn" onclick="sendQuick('Give me another example')">Another example</button>
      <button class="quick-ask-btn" onclick="sendQuick('Why is this useful in real life?')">Real-life use?</button>
      <button class="quick-ask-btn" onclick="sendQuick('I\\'m confused, can you help me start?')">I\\'m confused 😅</button>
    </div>
    <div class="ai-messages" id="ai-messages">
      <div class="ai-msg tutor">Hi! I'm Pyra 💜 I'm here to help you with <strong>${chData.title}</strong>. Ask me anything — no question is too small! ✨</div>
    </div>
    <div class="ai-input-row">
      <input class="ai-input" id="ai-input" type="text" placeholder="Ask Pyra anything about this chapter…" onkeydown="if(event.key==='Enter')sendAsk()">
      <button class="ai-send-btn" onclick="sendAsk()">Ask ✨</button>
    </div>`;
  main.appendChild(aiSection);

  // Bottom nav
  const nav = document.createElement('div');
  nav.className = 'bottom-nav';
  nav.innerHTML = `
    <button class="nav-btn" onclick="loadChapter(${ch-1})" ${ch<=1?'disabled':''}>← Previous</button>
    <span class="chapter-progress">Chapter ${ch} of 52</span>
    <button class="nav-btn primary" onclick="markDoneAndNext(${ch})">Complete & Next →</button>`;
  main.appendChild(nav);
}

function sendQuick(q){ document.getElementById('ai-input').value=q; sendAsk(); }
function sendAsk(){
  const inp=document.getElementById('ai-input');
  const q=inp.value.trim();
  if(!q) return;
  inp.value='';
  const ch=chapters[currentChapter];
  askTutor(q, ch?ch.title:'Python');
}

function checkAnswer(chosen, correct, explanation, ch){
  const opts=document.querySelectorAll('.quiz-opt');
  const feedback=document.getElementById('quiz-feedback');
  opts.forEach((o,i)=>{
    o.disabled=true;
    if(i===correct) o.classList.add('correct');
    else if(i===chosen && chosen!==correct) o.classList.add('wrong');
  });
  const isCorrect=chosen===correct;
  feedback.className='quiz-feedback show '+(isCorrect?'good':'bad');
  feedback.textContent=isCorrect?'✅ '+explanation:'❌ Not quite — '+explanation;
  if(isCorrect) markComplete(ch);
}

function markComplete(ch){
  completedChapters.add(ch);
  localStorage.setItem('py_done', JSON.stringify([...completedChapters]));
  updateProgress();
  updateSidebar();
}

function markDoneAndNext(ch){
  markComplete(ch);
  loadChapter(ch+1);
}

function updateProgress(){
  const done=completedChapters.size;
  document.getElementById('progress-pill').textContent=`${done} / 52 chapters`;
}

function updateSidebar(){
  document.querySelectorAll('.chapter-btn').forEach((btn,i)=>{
    btn.classList.toggle('done', completedChapters.has(i));
    btn.classList.toggle('active', i===currentChapter);
    if(completedChapters.has(i)){
      const icon=btn.querySelector('.ch-icon');
      if(!icon){
        const s=btn.querySelector('.ch-num');
        if(s) s.style.background='var(--green-light)';
      }
    }
  });
}

function renderWelcome(){
  const main=document.getElementById('main-area');
  main.innerHTML=`<div class="welcome">
    <h2>Welcome to Python! 🌸✨</h2>
    <p>This handbook turns your reading guide into an interactive learning experience — just like freeCodeCamp, but cuter and totally yours!</p>
    <div class="welcome-cards">
      <div class="welcome-card"><div class="icon">📖</div><h3>Lessons</h3><p>Clear explanations with examples from engineering and everyday life</p></div>
      <div class="welcome-card"><div class="icon">💻</div><h3>Code Editor</h3><p>Run Python right in your browser — no setup needed!</p></div>
      <div class="welcome-card"><div class="icon">🧠</div><h3>Quizzes</h3><p>Check your understanding after every chapter</p></div>
      <div class="welcome-card"><div class="icon">💜</div><h3>AI Tutor</h3><p>Ask Pyra anything — she's powered by Claude and always here to help</p></div>
    </div>
    <button class="start-btn" onclick="loadChapter(1)">Start Learning → Chapter 1 🚀</button>
  </div>`;
}

function renderComingSoon(ch, chData){
  const main=document.getElementById('main-area');
  main.innerHTML=`<div class="lesson-panel">
    <div class="lesson-tag">${chData.tag}</div>
    <div class="lesson-title">${chData.title}</div>
    <div class="lesson-subtitle">${chData.subtitle}</div>
    <div style="margin-top:28px;background:linear-gradient(135deg,var(--pink-light),var(--purple-light));border-radius:14px;padding:28px;text-align:center">
      <div style="font-size:2.5em;margin-bottom:12px">📖</div>
      <p style="font-weight:700;color:var(--purple);font-size:1.1em">Full lesson content is in your handbook!</p>
      <p style="color:var(--muted);font-size:.9em;margin-top:8px">Chapters 1–10 are fully interactive here. For chapters 11–52, open <strong>Python_Handbook_Book.html</strong> which has the complete content.</p>
      <p style="color:var(--muted);font-size:.9em;margin-top:8px">But you can still use Pyra below to ask questions about this chapter! 💜</p>
    </div>
    <div class="bottom-nav" style="padding:20px 0 0">
      <button class="nav-btn" onclick="loadChapter(${ch-1})">← Previous</button>
      <span class="chapter-progress">Chapter ${ch} of 52</span>
      <button class="nav-btn primary" onclick="markDoneAndNext(${ch})">Mark done & Next →</button>
    </div>
  </div>
  <div class="ai-section">
    <div class="ai-title">💜 Ask Pyra about ${chData.title}</div>
    <div class="quick-asks">
      <button class="quick-ask-btn" onclick="sendQuick('What is ${chData.title.replace(/'/g,"\\'")} in Python?')">What is it?</button>
      <button class="quick-ask-btn" onclick="sendQuick('Give me a simple example of ${chData.title.replace(/'/g,"\\'")}')">Show an example</button>
      <button class="quick-ask-btn" onclick="sendQuick('When would I use ${chData.title.replace(/'/g,"\\'")}?')">When to use it?</button>
    </div>
    <div class="ai-messages" id="ai-messages">
      <div class="ai-msg tutor">Hi! I'm Pyra 💜 Even though the full lesson for <strong>${chData.title}</strong> is in your handbook, I can still explain it and answer your questions here! Ask me anything ✨</div>
    </div>
    <div class="ai-input-row">
      <input class="ai-input" id="ai-input" type="text" placeholder="Ask Pyra anything about ${chData.title}…" onkeydown="if(event.key==='Enter')sendAsk()">
      <button class="ai-send-btn" onclick="sendAsk()">Ask ✨</button>
    </div>
  </div>`;
}

function loadChapter(ch){
  if(ch<0 || ch>52) return;
  currentChapter=ch;
  const chData=chapters[ch]||chapters[0];
  renderLesson(ch, chData);
  updateSidebar();
  document.getElementById('main-area').scrollTop=0;
}

// ── Init ──
updateProgress();
loadChapter(0);
</script>
</body>
</html>
