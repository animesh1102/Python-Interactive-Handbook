<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Python Handbook ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#e91e8c;--pink-light:#fce4ec;--pink-mid:#f48fb1;
  --purple:#9c27b0;--purple-light:#f3e5f5;--purple-mid:#ce93d8;
  --lavender:#5c6bc0;--lavender-light:#e8eaf6;
  --green:#43a047;--green-light:#e8f5e9;
  --amber:#f57c00;--amber-light:#fff8e1;
  --red:#e53935;--red-light:#ffebee;
  --text:#2d2d2d;--muted:#757575;--border:#e0d7f0;
  --page:#fdf6ff;
}

html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:var(--page);color:var(--text);font-size:15px;display:flex;flex-direction:column}

/* ── Header ── */
header{
  background:linear-gradient(135deg,#e91e8c,#9c27b0,#5c6bc0);
  padding:12px 16px;
  display:flex;align-items:center;gap:10px;
  position:relative;z-index:200;
  flex-shrink:0;
}
header h1{color:#fff;font-size:1em;font-weight:800;flex:1}
.menu-btn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 10px;font-size:1.1em;cursor:pointer;line-height:1}
.progress-pill{background:rgba(255,255,255,.2);color:#fff;border-radius:20px;padding:4px 10px;font-size:.75em;font-weight:700;white-space:nowrap}

/* ── Drawer overlay ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:none}
.overlay.open{display:block}

/* ── Sidebar drawer ── */
.sidebar{
  position:fixed;left:0;top:0;bottom:0;width:280px;max-width:85vw;
  background:#fff;z-index:400;
  transform:translateX(-100%);transition:transform .25s ease;
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar.open{transform:translateX(0)}
.sidebar-head{
  background:linear-gradient(135deg,#e91e8c,#9c27b0);
  padding:16px;color:#fff;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.sidebar-head h2{font-size:1em;font-weight:800}
.close-btn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:1em;cursor:pointer}
.sidebar-scroll{overflow-y:auto;flex:1;padding:8px 0}
.sidebar-section{padding:8px 16px 2px;font-size:.68em;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--purple);margin-top:4px}
.chapter-btn{
  width:100%;text-align:left;padding:10px 16px;border:none;background:transparent;
  cursor:pointer;font-family:'Nunito',sans-serif;font-size:.88em;font-weight:600;
  color:var(--muted);border-left:3px solid transparent;
  display:flex;align-items:center;gap:8px;transition:all .12s;
}
.chapter-btn:active{background:var(--purple-light)}
.chapter-btn.active{background:var(--pink-light);color:var(--pink);border-left-color:var(--pink);font-weight:800}
.ch-num{font-size:.72em;background:var(--lavender-light);color:var(--lavender);border-radius:10px;padding:2px 7px;font-weight:700;flex-shrink:0}
.ch-done .ch-num{background:var(--green-light);color:var(--green)}

/* ── Main scroll area ── */
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ── Lesson panel ── */
.lesson-panel{padding:20px 16px 16px}
.lesson-tag{display:inline-block;background:linear-gradient(135deg,#e91e8c,#9c27b0);color:#fff;border-radius:20px;padding:3px 12px;font-size:.75em;font-weight:800;margin-bottom:8px}
.lesson-title{font-size:1.4em;font-weight:800;color:#1a1a1a;line-height:1.2;margin-bottom:3px}
.lesson-subtitle{color:var(--muted);font-size:.85em;margin-bottom:16px}

.lesson-objectives{background:linear-gradient(135deg,var(--lavender-light),var(--purple-light));border-left:4px solid var(--lavender);border-radius:0 10px 10px 0;padding:12px 14px;margin:14px 0;font-size:.88em}
.lesson-objectives strong{color:var(--lavender);display:block;margin-bottom:6px;font-size:.82em;text-transform:uppercase;letter-spacing:.06em}
.lesson-objectives ul{padding-left:1.2em}
.lesson-objectives li{margin:3px 0}

.lesson-body p{margin-bottom:.8em;line-height:1.65}
.lesson-body h3{font-size:1em;font-weight:800;color:var(--purple);margin:18px 0 6px;padding-bottom:4px;border-bottom:2px dashed var(--border)}
.lesson-body h3::before{content:"✿ ";color:var(--pink-mid)}
.lesson-body strong{color:var(--purple)}
.lesson-body ul,.lesson-body ol{padding-left:1.3em;margin:.3em 0 .8em}
.lesson-body li{margin:4px 0;line-height:1.5}
.lesson-body li::marker{color:var(--pink)}

table{border-collapse:collapse;width:100%;margin:10px 0;font-size:.82em;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
th{background:linear-gradient(90deg,#e91e8c,#9c27b0);color:#fff;font-weight:800;padding:7px 10px;text-align:left;white-space:nowrap}
td{padding:5px 10px;border-bottom:1px solid var(--border);vertical-align:top}
tr:nth-child(even) td{background:var(--pink-light)}

.code-block{background:#f8f4ff;border:1.5px solid var(--border);border-left:4px solid var(--purple-mid);border-radius:10px;margin:12px 0;overflow:hidden}
.code-label{background:linear-gradient(90deg,var(--purple-light),var(--lavender-light));padding:6px 12px;font-size:.7em;font-weight:800;color:var(--purple);text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:5px;border-bottom:1px solid var(--border)}
.code-label::before{content:"💻"}
pre.code-content{padding:12px 14px;font-family:'Source Code Pro',monospace;font-size:.78em;line-height:1.55;color:#1a1a1a;overflow-x:auto;-webkit-overflow-scrolling:touch}

.info-box{border-radius:10px;padding:10px 14px;margin:12px 0;font-size:.87em;display:flex;gap:10px;align-items:flex-start}
.info-box.tip{background:var(--amber-light);border:1px solid #ffe082}
.info-box.note{background:var(--lavender-light);border:1px solid var(--lavender)}
.info-box.warning{background:var(--red-light);border:1px solid #ef9a9a}
.info-icon{font-size:1.1em;min-width:18px;flex-shrink:0}

.lesson-divider{border:none;text-align:center;color:var(--pink-mid);font-size:1em;letter-spacing:.4em;margin:18px 0}
.lesson-divider::before{content:"✦ ✿ ✦"}

/* ── Code editor ── */
.editor-section{background:#f8f4ff;border:2px solid var(--purple-mid);border-radius:12px;margin:16px 0;overflow:hidden}
.editor-header{background:linear-gradient(90deg,var(--purple-light),var(--lavender-light));padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.editor-title{font-weight:800;color:var(--purple);font-size:.85em;display:flex;align-items:center;gap:6px}
.run-btn{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:20px;padding:8px 18px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.82em;cursor:pointer;-webkit-tap-highlight-color:transparent}
.run-btn:active{opacity:.85}
.code-editor{
  width:100%;min-height:110px;
  font-family:'Source Code Pro',monospace;font-size:.8em;
  background:transparent;border:none;border-top:1px solid var(--border);
  padding:12px 14px;resize:vertical;outline:none;color:#1a1a1a;line-height:1.6;
  -webkit-text-size-adjust:100%;
}
.output-area{border-top:1px solid var(--border);padding:10px 14px;background:#fff}
.output-label{font-size:.68em;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px;font-family:'Nunito',sans-serif}
.output-box{font-family:'Source Code Pro',monospace;font-size:.78em;min-height:32px;color:#1a1a1a;white-space:pre-wrap;line-height:1.5}
.output-box.error{color:var(--red)}

/* ── Quiz ── */
.quiz-section{background:linear-gradient(135deg,#fce4ec,#f3e5f5);border:2px solid var(--pink-mid);border-radius:14px;padding:18px;margin:16px 0}
.quiz-title{font-size:.95em;font-weight:800;color:var(--pink);margin-bottom:3px}
.quiz-subtitle{font-size:.8em;color:var(--muted);margin-bottom:14px}
.quiz-q{font-weight:700;margin-bottom:12px;font-size:.92em;line-height:1.5}
.quiz-options{display:flex;flex-direction:column;gap:8px}
.quiz-opt{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;border:2px solid var(--border);border-radius:10px;
  cursor:pointer;background:#fff;font-size:.88em;font-weight:600;text-align:left;
  width:100%;font-family:'Nunito',sans-serif;line-height:1.4;
  -webkit-tap-highlight-color:transparent;
}
.quiz-opt:active{background:var(--purple-light)}
.quiz-opt.correct{border-color:var(--green);background:var(--green-light);color:var(--green)}
.quiz-opt.wrong{border-color:var(--red);background:var(--red-light);color:var(--red)}
.quiz-opt-letter{width:28px;height:28px;border-radius:50%;background:var(--purple-light);color:var(--purple);font-weight:800;font-size:.8em;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.quiz-feedback{margin-top:12px;padding:10px 14px;border-radius:10px;font-size:.85em;font-weight:700;display:none;line-height:1.5}
.quiz-feedback.show{display:block}
.quiz-feedback.good{background:var(--green-light);color:var(--green)}
.quiz-feedback.bad{background:var(--red-light);color:var(--red)}

/* ── AI Tutor ── */
.ai-section{padding:0 16px 16px}
.ai-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;overflow:hidden}
.ai-card-head{background:linear-gradient(135deg,var(--pink-light),var(--purple-light));padding:12px 14px;display:flex;align-items:center;gap:8px}
.ai-card-head span{font-weight:800;color:var(--purple);font-size:.9em}
.ai-messages{padding:12px 14px;display:flex;flex-direction:column;gap:8px;max-height:240px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ai-msg{padding:9px 12px;border-radius:12px;font-size:.85em;line-height:1.55;max-width:92%}
.ai-msg.tutor{background:var(--purple-light);border-bottom-left-radius:4px;align-self:flex-start}
.ai-msg.user{background:linear-gradient(135deg,var(--pink-light),var(--lavender-light));border-bottom-right-radius:4px;align-self:flex-end}
.ai-msg.loading{background:var(--purple-light);color:var(--muted);font-style:italic}
.quick-asks{padding:0 14px 10px;display:flex;gap:6px;flex-wrap:wrap}
.quick-ask-btn{background:var(--purple-light);color:var(--purple);border:none;border-radius:20px;padding:6px 12px;font-family:'Nunito',sans-serif;font-size:.78em;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.quick-ask-btn:active{background:var(--purple-mid);color:#fff}
.ai-input-row{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);background:#fafafa}
.ai-input{flex:1;border:1.5px solid var(--border);border-radius:20px;padding:9px 14px;font-family:'Nunito',sans-serif;font-size:.85em;outline:none;background:#fff;min-width:0}
.ai-input:focus{border-color:var(--purple-mid)}
.ai-send-btn{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:20px;padding:9px 16px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.82em;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent}

/* ── Bottom nav ── */
.bottom-nav{display:flex;justify-content:space-between;align-items:center;padding:12px 16px 24px;gap:8px}
.nav-btn{padding:10px 16px;border-radius:24px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.85em;cursor:pointer;border:2px solid var(--border);background:#fff;color:var(--muted);-webkit-tap-highlight-color:transparent;flex:1;text-align:center}
.nav-btn:active{background:var(--purple-light)}
.nav-btn.primary{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border-color:transparent}
.nav-btn.primary:active{opacity:.88}
.nav-btn:disabled{opacity:.35;pointer-events:none}

/* ── Welcome ── */
.welcome{padding:24px 16px 32px}
.welcome h2{font-size:1.6em;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,#e91e8c,#9c27b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2}
.welcome p{color:var(--muted);margin-bottom:20px;font-size:.92em;line-height:1.65}
.welcome-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.welcome-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:14px 12px;text-align:center}
.welcome-card .icon{font-size:1.8em;margin-bottom:6px}
.welcome-card h3{font-size:.82em;font-weight:800;color:var(--purple);margin-bottom:3px}
.welcome-card p{font-size:.75em;color:var(--muted);line-height:1.4}
.start-btn{width:100%;background:linear-gradient(135deg,#e91e8c,#9c27b0);color:#fff;border:none;border-radius:28px;padding:15px;font-family:'Nunito',sans-serif;font-weight:800;font-size:1em;cursor:pointer;-webkit-tap-highlight-color:transparent}
.start-btn:active{opacity:.88}

/* ── Coming soon ── */
.coming-soon-box{margin:20px 0;background:linear-gradient(135deg,var(--pink-light),var(--purple-light));border-radius:14px;padding:24px 16px;text-align:center}
.coming-soon-box .icon{font-size:2.2em;margin-bottom:10px}
.coming-soon-box h3{font-weight:800;color:var(--purple);font-size:1em;margin-bottom:6px}
.coming-soon-box p{font-size:.85em;color:var(--muted);line-height:1.55}
</style>
</head>

let currentChapter = -1;
let completedChapters = new Set(JSON.parse(localStorage.getItem('py_done')||'[]'));
let aiHistory = [];

// ── Sidebar ──
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ── Chapter data ──
const chapters = {
  0:{title:"Welcome! 🌸",tag:"Start Here",isWelcome:true},
  1:{
    title:"What Is Programming?",subtitle:"Understanding what code actually is",tag:"Chapter 1",
    objectives:["Explain what a program is","Describe how a computer follows instructions","Understand hardware vs software","Explain why Python is a great first language"],

// ── Safe code runner ──
function runCode(code, outEl){
  outEl.className='output-box';
  const lines=[];
  const fakePrint=(...a)=>lines.push(a.map(String).join(' '));
  try{
    const t=code.replace(/^#.*$/gm,'').replace(/\binput\s*\(/g,'__inp(');
    new Function('print','__inp',t)(fakePrint,(p)=>{lines.push((p||'')+'[input not available in browser]');return '';});
    outEl.textContent=lines.length?lines.join('\n'):'(no output — use print()!)';
  }catch(e){outEl.className='output-box error';outEl.textContent='❌ '+e.message;}
}

// ── AI Tutor ──
async function askTutor(q,title){
  const el=document.getElementById('ai-messages');
  const uMsg=document.createElement('div');
  uMsg.className='ai-msg user';uMsg.textContent=q;el.appendChild(uMsg);
  const lMsg=document.createElement('div');
  lMsg.className='ai-msg loading';lMsg.textContent='✨ thinking…';el.appendChild(lMsg);
  el.scrollTop=el.scrollHeight;
  aiHistory.push({role:'user',content:q});
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:`You are Pyra, a fun encouraging Python tutor for teen girls. Current chapter: "${title}". Keep answers SHORT (2-5 sentences). Warm friendly tone, occasional emoji. Give Python examples when helpful. Simple language.`,messages:aiHistory})});
    const d=await r.json();
    const reply=d.content?.[0]?.text||"Couldn't connect — try again!";
    aiHistory.push({role:'assistant',content:reply});
    lMsg.remove();
    const tm=document.createElement('div');
    tm.className='ai-msg tutor';
    tm.innerHTML=reply.replace(/`([^`]+)`/g,'<code>$1</code>');
    el.appendChild(tm);el.scrollTop=el.scrollHeight;
  }catch(e){lMsg.textContent='⚠️ No connection. Check internet and try again!';lMsg.classList.remove('loading');}
}

function sendQuick(q){document.getElementById('ai-input').value=q;sendAsk();}
function sendAsk(){
  const inp=document.getElementById('ai-input');
  const q=inp.value.trim();if(!q)return;inp.value='';
  askTutor(q,chapters[currentChapter]?.title||'Python');
}

// ── Quiz ──
function checkAnswer(chosen,correct,exp,ch){
  document.querySelectorAll('.quiz-opt').forEach((o,i)=>{
    o.disabled=true;
    if(i===correct)o.classList.add('correct');
    else if(i===chosen&&chosen!==correct)o.classList.add('wrong');
  });
  const fb=document.getElementById('quiz-fb');
  const ok=chosen===correct;
  fb.className='quiz-feedback show '+(ok?'good':'bad');
  fb.textContent=(ok?'✅ ':'❌ ')+exp;
  if(ok){completedChapters.add(ch);localStorage.setItem('py_done',JSON.stringify([...completedChapters]));updateProgress();updateSidebar();}
}

function markDone(ch){
  completedChapters.add(ch);
  localStorage.setItem('py_done',JSON.stringify([...completedChapters]));
  updateProgress();updateSidebar();
  loadChapter(ch+1<=52?ch+1:ch);
}

function updateProgress(){
  document.getElementById('progress-pill').textContent=`${completedChapters.size} / 52`;
}

function updateSidebar(){
  document.querySelectorAll('.chapter-btn').forEach((btn,i)=>{
    btn.classList.toggle('active',i===currentChapter);
    btn.classList.toggle('ch-done',completedChapters.has(i));
  });
}

// ── Render ──
function loadChapter(ch){
  if(ch<0||ch>52)return;
  currentChapter=ch;
  const d=chapters[ch];
  const m=document.getElementById('main-area');
  m.scrollTop=0;

  if(d.isWelcome){renderWelcome();updateSidebar();return;}
  if(d.isComingSoon){renderComingSoon(ch,d);updateSidebar();return;}

  html+='<div class="lesson-body">';
  (d.sections||[]).forEach(s=>{html+=`<h3>${s.h}</h3><p>${s.c}</p>`;});

  if(d.quiz) html+=`<hr class="lesson-divider">
  <div class="quiz-section">

    <div class="quiz-q">${d.quiz.q}</div>

  html+=`</div>`;

  // AI tutor
  html+=`<div class="ai-section">
  <div class="ai-card">
    <div class="ai-card-head"><span>💜 Ask Pyra — your AI tutor</span></div>
    <div class="ai-messages" id="ai-messages">
      <div class="ai-msg tutor">Hi! I'm Pyra 💜 I'm here to help with <strong>${d.title}</strong>. Ask me anything! ✨</div>
    </div>
    <div class="quick-asks">
      <button class="quick-ask-btn" onclick="sendQuick('Explain this in simpler terms')">Simpler?</button>
      <button class="quick-ask-btn" onclick="sendQuick('Give me another example')">Example</button>
      <button class="quick-ask-btn" onclick="sendQuick('Why is this useful?')">Why useful?</button>
      <button class="quick-ask-btn" onclick="sendQuick('I am confused, help me start')">Help! 😅</button>
    </div>
    <div class="ai-input-row">
      <input class="ai-input" id="ai-input" type="text" placeholder="Ask Pyra anything…" onkeydown="if(event.key==='Enter')sendAsk()">
      <button class="ai-send-btn" onclick="sendAsk()">Ask ✨</button>
    </div>
  </div>
  </div>`;

  // Bottom nav
  html+=`<div class="bottom-nav">
  <button class="nav-btn" onclick="loadChapter(${ch-1})" ${ch<=1?'disabled':''}>← Back</button>
  <button class="nav-btn primary" onclick="markDone(${ch})">Done → Next ✓</button>
  </div>`;

  m.innerHTML=html;
  aiHistory=[];
  updateSidebar();
}
