ic for deployment.</p>","c":"from sklearn.linear_model import LinearRegression\nimport numpy as np\nimport matplotlib.pyplot as plt\n\n# Dataset: altitude (ft) vs. ISA temperature (\u00b0C)\naltitudes = np.array([0, 5000, 10000, 15000, 20000, 25000, 30000, 35000]).reshape(-1, 1)\ntemperatures = np.array([15, -2.5, -20, -37.5, -55, -55, -55, -55])\n\n# Train a linear model\nmodel = LinearRegression()\nmodel.fit(altitudes[:5], temperatures[:5])   # Fit on troposphere only\n\n# Predict\nalt_range = np.linspace(0, 35000, 100).reshape(-1, 1)\ntemp_pred = model.predict(alt_range)\n\n# Plot\nplt.figure(figsize=(8, 5))\nplt.scatter(altitudes, temperatures, color=\"red\", zorder=5, label=\"Actual ISA\")\nplt.plot(alt_range, temp_pred, \"b--\", label=\"Linear Regression\")\nplt.xlabel(\"Altitude (ft)\")\nplt.ylabel(\"Temperature (\u00b0C)\")\nplt.title(\"Linear Regression: Altitude vs. Temperature\")\nplt.legend()\nplt.grid(True, alpha=0.3)\nplt.show()\n\nprint(f\"Lapse rate estimate: {model.coef_[0]*1000:.4f} \u00b0C per 1000 ft\")"},"52":{"t":"Career Roadmap and Final Revision Guide","s":"Your path from beginner to professional","o":[],"h":"<h3>52.1 Your Python Roadmap</h3>\n<p><strong>Stage 1 \u2014 Foundations (Chapters 1\u201320):</strong> Variables, types, strings, lists, dicts, loops, functions, modules. You can write useful scripts that solve real problems.</p>\n<p><strong>Stage 2 \u2014 Intermediate (Chapters 21\u201329):</strong> File handling, exceptions, OOP, JSON, virtual environments. You can build structured, robust applications.</p>\n<p><strong>Stage 3 \u2014 Advanced (Chapters 30\u201338):</strong> Testing, generators, decorators, comprehensions, type hints, dataclasses. Your code is professional-grade.</p>\n<p><strong>Stage 4 \u2014 Ecosystem (Chapters 39\u201351):</strong> APIs, web scraping, NumPy, Pandas, Matplotlib. You can analyse data, call APIs, and build data pipelines.</p>\n<p><strong>Stage 5 \u2014 Specialisation:</strong></p>\n<p>Choose your domain and go deep. Engineering \u2192 SciPy, OpenMDAO. Data Science \u2192 scikit-learn, PyTorch. Web \u2192 FastAPI, Django. Automation \u2192 Playwright, Airflow.</p>\n<h3>52.2 Building a Portfolio</h3>\n<p>Start these projects early and push them to GitHub:</p>\n<ol>\n<li><strong>Unit converter library</strong> \u2014 covers functions, modules, testing.</li>\n<li><strong>Personal expense tracker</strong> \u2014 covers file handling, JSON, OOP.</li>\n<li><strong>CSV analyser</strong> \u2014 covers Pandas, Matplotlib.</li>\n<li><strong>Weather dashboard</strong> \u2014 covers APIs, JSON parsing, visualisation.</li>\n<li><strong>Engineering calculator</strong> \u2014 covers NumPy, scipy, OOP, GUI (Tkinter).</li>\n<li><strong>Mini data pipeline</strong> \u2014 download data, clean it with Pandas, visualise, output report.</li>\n</ol>\n<h3>52.3 Final Syntax Cheat Sheet</h3>\n<div class=\"inline-code\"><pre># \u2500\u2500 BASICS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nx = 10                          # Assignment\nx += 5                          # Augmented assignment\nprint(f\"x = {x:.2f}\")          # f-string output\nname = input(\"Name: \")          # User input (always str)\n\n# \u2500\u2500 TYPES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nint(\"42\")     float(\"3.14\")     str(42)     bool(0)\ntype(x)       isinstance(x, int)\n\n# \u2500\u2500 STRINGS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ns = \"Hello, World!\"\ns[0]     s[-1]     s[1:5]     s[::-1]\ns.upper()  s.lower()  s.strip()  s.split(\",\")  s.replace(\"a\",\"b\")\n\", \".join([\"a\",\"b\",\"c\"])\nf\"Name: {name!r}, Val: {x:.3f}\"\n\n# \u2500\u2500 LISTS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nlst = [1, 2, 3]\nlst.append(4)  lst.insert(0, 0)  lst.extend([5,6])\nlst.remove(2)  lst.pop()  lst.sort()  lst.reverse()\nlen(lst)  min(lst)  max(lst)  sum(lst)\n\n# \u2500\u2500 DICTS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nd = {\"key\": \"value\"}\nd[\"key\"]  d.get(\"key\", default)\nd[\"new\"] = \"val\"  del d[\"key\"]\nfor k, v in d.items(): pass\n\n# \u2500\u2500 SETS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ns = {1, 2, 3}\ns.add(4)  s.discard(2)\ns1 | s2   s1 &amp; s2   s1 - s2\n\n# \u2500\u2500 CONTROL FLOW \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nif x &gt; 0:\n    pass\nelif x == 0:\n    pass\nelse:\n    pass\n\nresult = \"pos\" if x &gt; 0 else \"non-pos\"   # Ternary\n\nfor item in iterable:\n    if condition: continue\n    if other: break\n\nwhile condition:\n    pass\n\nfor i in range(start, stop, step): pass\nfor i, v in enumerate(lst): pass\nfor k, v in d.items(): pass\n\n# \u2500\u2500 FUNCTIONS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndef func(a, b=0, *args, **kwargs) -&gt; float:\n    \"\"\"Docstring.\"\"\"\n    return a + b\n\nresult = func(1, b=2)\nsquare = lambda x: x**2\n\n# \u2500\u2500 COMPREHENSIONS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n[x**2 for x in range(10) if x % 2 == 0]\n{k: v for k, v in d.items()}\n{x for x in lst}\n(x**2 for x in range(10))   # Generator\n\n# \u2500\u2500 CLASSES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nclass MyClass(Parent):\n    class_var = 0\n\n    def __init__(self, x: int) -&gt; None:\n        super().__init__()\n        self.x = x\n\n    def method(self) -&gt; int:\n        return self.x\n\n    def __str__(self) -&gt; str:\n        return f\"MyClass({self.x})\"\n\n    @property\n    def doubled(self) -&gt; int:\n        return self.x * 2\n\n# \u2500\u2500 EXCEPTIONS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ntry:\n    risky()\nexcept (ValueError, TypeError) as e:\n    print(e)\nelse:\n    success()\nfinally:\n    cleanup()\n\nraise ValueError(\"message\")\n\n# \u2500\u2500 FILES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nwith open(\"file.txt\", \"r\") as f:\n    content = f.read()\n    lines = f.readlines()\n\nwith open(\"file.txt\", \"w\") as f:\n    f.write(\"text\\n\")\n\n# \u2500\u2500 MODULES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nimport math, os, json, random, re, csv\nfrom datetime import datetime, timedelta\nfrom pathlib import Path\nfrom typing import List, Dict, Optional, Tuple\n\n# \u2500\u2500 NUMPY (import numpy as np) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\na = np.array([1,2,3])\nnp.zeros((3,3))  np.ones((2,4))  np.eye(3)\nnp.arange(0,10,0.5)  np.linspace(0,1,100)\na.shape  a.dtype  a.reshape(3,1)\nnp.sin(a)  np.sqrt(a)  np.sum(a)  np.mean(a)\nnp.linalg.solve(A, b)\n\n# \u2500\u2500 PANDAS (import pandas as pd) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndf = pd.read_csv(\"file.csv\")\ndf.head()  df.describe()  df.info()\ndf[\"col\"]  df[[\"col1\",\"col2\"]]\ndf[df[\"col\"] &gt; 5]\ndf.groupby(\"col\").mean()\ndf.to_csv(\"out.csv\", index=False)\n\n# \u2500\u2500 MATPLOTLIB (import matplotlib.pyplot as plt) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nplt.figure(figsize=(8,5))\nplt.plot(x, y, label=\"line\", color=\"blue\")\nplt.scatter(x, y)  plt.bar(cats, vals)  plt.hist(data, bins=20)\nplt.xlabel(\"X\")  plt.ylabel(\"Y\")  plt.title(\"Title\")\nplt.legend()  plt.grid(True)\nplt.tight_layout()\nplt.savefig(\"plot.png\", dpi=150)\nplt.show()</pre></div>\n<h3>52.4 Recommended Resources</h3>\n<p><strong>Books:</strong></p>\n<ul>\n<li><em>Python Crash Course</em> \u2014 Eric Matthes (best first book)</li>\n<li><em>Automate the Boring Stuff with Python</em> \u2014 Al Sweigart (free online)</li>\n<li><em>Fluent Python</em> \u2014 Luciano Ramalho (advanced)</li>\n<li><em>Python Cookbook</em> \u2014 David Beazley (recipes for real problems)</li>\n<li><em>Python Data Science Handbook</em> \u2014 Jake VanderPlas (free online)</li>\n<li><em>Hands-On Machine Learning</em> \u2014 Aur\u00e9lien G\u00e9ron</li>\n</ul>\n<p><strong>Websites:</strong></p>\n<ul>\n<li>[docs.python.org](https://docs.python.org) \u2014 Official documentation</li>\n<li>[realpython.com](https://realpython.com) \u2014 Tutorials for all levels</li>\n<li>[peps.python.org](https://peps.python.org) \u2014 Python Enhancement Proposals (PEP 8, etc.)</li>\n<li>[stackoverflow.com](https://stackoverflow.com) \u2014 Q&A community</li>\n</ul>\n<p><strong>Practice Platforms:</strong></p>\n<ul>\n<li>[leetcode.com](https://leetcode.com) \u2014 Algorithm problems</li>\n<li>[hackerrank.com](https://hackerrank.com) \u2014 Python challenges</li>\n<li>[projecteuler.net](https://projecteuler.net) \u2014 Mathematical programming problems</li>\n<li>[kaggle.com](https://kaggle.com) \u2014 Data science competitions and datasets</li>\n</ul>\n<p><strong>Open-Source Projects for Beginners:</strong></p>\n<ul>\n<li>Look for GitHub repos labelled <code>good first issue</code>.</li>\n<li>Try contributing to Python documentation.</li>\n<li>Build tools your fellow engineers can use.</li>\n</ul>\n<h3>52.5 The Standard Library: Quick Reference</h3>\n<div class=\"tbl-wrap\"><table>\n<tr><th>Module</th><th>Purpose</th></tr>\n<tr><td><code>os</code></td><td>File system, paths, environment</td></tr>\n<tr><td><code>sys</code></td><td>Python interpreter access</td></tr>\n<tr><td><code>math</code></td><td>Mathematical functions</td></tr>\n<tr><td><code>random</code></td><td>Random numbers</td></tr>\n<tr><td><code>datetime</code></td><td>Dates and times</td></tr>\n<tr><td><code>re</code></td><td>Regular expressions</td></tr>\n<tr><td><code>json</code></td><td>JSON encode/decode</td></tr>\n<tr><td><code>csv</code></td><td>CSV read/write</td></tr>\n<tr><td><code>pathlib</code></td><td>Object-oriented paths</td></tr>\n<tr><td><code>collections</code></td><td>Counter, defaultdict, deque</td></tr>\n<tr><td><code>itertools</code></td><td>Combinatorial iterators</td></tr>\n<tr><td><code>functools</code></td><td>Higher-order functions</td></tr>\n<tr><td><code>typing</code></td><td>Type hint support</td></tr>\n<tr><td><code>logging</code></td><td>Application logging</td></tr>\n<tr><td><code>argparse</code></td><td>Command-line argument parsing</td></tr>\n<tr><td><code>unittest</code></td><td>Testing framework</td></tr>\n<tr><td><code>copy</code></td><td>Shallow and deep copies</td></tr>\n<tr><td><code>time</code></td><td>Time measurement</td></tr>\n<tr><td><code>io</code></td><td>Stream I/O</td></tr>\n<tr><td><code>struct</code></td><td>Binary data packing</td></tr>\n<tr><td><code>threading</code></td><td>Threading</td></tr>\n<tr><td><code>multiprocessing</code></td><td>Process-based parallelism</td></tr>\n<tr><td><code>subprocess</code></td><td>Run external commands</td></tr>\n<tr><td><code>socket</code></td><td>Network communication</td></tr>\n<tr><td><code>http.client</code></td><td>Low-level HTTP</td></tr>\n<tr><td><code>sqlite3</code></td><td>Built-in SQLite database</td></tr>\n<tr><td><code>hashlib</code></td><td>Cryptographic hashes</td></tr>\n<tr><td><code>base64</code></td><td>Base64 encoding</td></tr>\n<tr><td><code>gzip</code> / <code>zipfile</code></td><td>Compression</td></tr>\n<tr><td><code>pickle</code></td><td>Object serialisation</td></tr>\n<tr><td><code>pprint</code></td><td>Pretty-print</td></tr>\n<tr><td><code>traceback</code></td><td>Exception formatting</td></tr>\n</table></div>\n<h3>52.6 Final Quiz \u2014 Across All Chapters</h3>\n<ol>\n<li>What is the difference between <code>is</code> and <code>==</code>?</li>\n<li>How do you create an empty set (not an empty dict)?</li>\n<li>What does <code>@property</code> do?</li>\n<li>What is the purpose of <code>__init__</code>?</li>\n<li>What does <code>yield</code> do, and how does it differ from <code>return</code>?</li>\n<li>What is the LEGB rule?</li>\n<li>When would you use a generator instead of a list?</li>\n<li>What does <code>df.groupby(\"col\").mean()</code> do in Pandas?</li>\n<li>How do you install a package and save it to requirements.txt?</li>\n<li>What does <code>response.raise_for_status()</code> do?</li>\n<li>Name three falsy values in Python.</li>\n<li>What is the difference between <code>float(\"inf\")</code> and <code>math.inf</code>?</li>\n<li>How do you reverse a list in-place? How do you create a reversed copy?</li>\n<li>What does <code>zip()</code> do?</li>\n<li>Explain decorator syntax in one sentence.</li>\n</ol>\n<p><em>(Answers: 1: == checks equality of value; is checks identity (same object in memory). 2: <code>set()</code>. 3: Makes a method accessible as an attribute. 4: Runs when an object is instantiated \u2014 the constructor. 5: yield pauses the function and returns a value; execution resumes next time next() is called. return exits permanently. 6: Local, Enclosing, Global, Built-in \u2014 search order for names. 7: When data is too large for memory or you only need to iterate once. 8: Groups rows by unique values in col and computes the mean of each group. 9: <code>pip install package</code>, then <code>pip freeze &gt; requirements.txt</code>. 10: Raises an HTTPError if the status code indicates a failure (4xx or 5xx). 11: 0, \"\", None (also: 0.0, [], (), {}, set()). 12: They are equivalent \u2014 both represent positive infinity. 13: <code>.sort(reverse=True)</code> in-place; <code>lst[::-1]</code> or <code>list(reversed(lst))</code> for a copy. 14: Combines two or more iterables into tuples: <code>zip([1,2],[3,4])</code> \u2192 <code>(1,3),(2,4)</code>. 15: A decorator is a function that wraps another function, applied with the <code>@</code> syntax to modify or extend its behaviour.)</em></p>\n<h3>52.7 A Final Word</h3>\n<p>You now have a complete map of Python from first principles to professional practice. The map is not the territory \u2014 reading this handbook is the beginning, not the end. The only way to truly learn programming is to write programs.</p>\n<p>Set yourself a challenge each week:</p>\n<ul>\n<li>Automate something repetitive in your work or life.</li>\n<li>Analyse a dataset from engineering or aviation.</li>\n<li>Build a tool a colleague would find useful.</li>\n<li>Contribute to an open-source project.</li>\n<li>Solve ten problems on HackerRank.</li>\n</ul>\n<p>Every expert programmer was once exactly where you are now. The difference between where you are and where you want to be is simply time and practice.</p>\n<p>Write code. Break things. Fix them. Repeat.</p>\n<p><em>End of The Complete Python Handbook</em></p>\n<p><strong>Appendix: Useful escape sequences and format specifiers</strong></p>\n<div class=\"tbl-wrap\"><table>\n<tr><th>Escape</th><th>Meaning</th></tr>\n<tr><td><code>\\n</code></td><td>Newline</td></tr>\n<tr><td><code>\\t</code></td><td>Tab</td></tr>\n<tr><td><code>\\\\</code></td><td>Backslash</td></tr>\n<tr><td><code>\\'</code> <code>\\\"</code></td><td>Quote</td></tr>\n<tr><td><code>\\r</code></td><td>Carriage return</td></tr>\n</table></div>\n<div class=\"tbl-wrap\"><table>\n<tr><th>Format Specifier</th><th>Effect</th></tr>\n<tr><td><code>{x:.2f}</code></td><td>Float, 2 decimal places</td></tr>\n<tr><td><code>{x:.4e}</code></td><td>Scientific notation, 4 decimal places</td></tr>\n<tr><td><code>{x:,}</code></td><td>Thousands separator</td></tr>\n<tr><td><code>{x:d}</code></td><td>Integer</td></tr>\n<tr><td><code>{x:08d}</code></td><td>Integer padded with zeros to 8 chars</td></tr>\n<tr><td><code>{x:&gt;10}</code></td><td>Right-align in field of width 10</td></tr>\n<tr><td><code>{x:&lt;10}</code></td><td>Left-align in field of width 10</td></tr>\n<tr><td><code>{x:^10}</code></td><td>Centre in field of width 10</td></tr>\n<tr><td><code>{x!r}</code></td><td>repr() form</td></tr>\n<tr><td><code>{x!s}</code></td><td>str() form</td></tr>\n<tr><td><code>{x:.0%}</code></td><td>Percentage (0.85 \u2192 85%)</td></tr>\n</table></div>","c":"# \u2500\u2500 BASICS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nx = 10                          # Assignment\nx += 5                          # Augmented assignment\nprint(f\"x = {x:.2f}\")          # f-string output\nname = input(\"Name: \")          # User input (always str)\n\n# \u2500\u2500 TYPES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nint(\"42\")     float(\"3.14\")     str(42)     bool(0)\ntype(x)       isinstance(x, int)\n\n# \u2500\u2500 STRINGS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ns = \"Hello, World!\"\ns[0] const ETIPS=[
  {p:/NameError.*name '(.+?)' is not defined/i,f:m=>'<strong>NameError: <code>'+m[1]+'</code> is not defined</strong><br>Did you forget to create this variable first? Python is case-sensitive, so <code>Name</code> and <code>name</code> are different. Check for typos too.'},
  {p:/SyntaxError.*EOL while scanning string/i,f:()=>'<strong>SyntaxError: Unclosed string</strong><br>You opened a quote but forgot to close it. Every <code>"</code> needs a matching <code>"</code>. Count your quotes!'},
  {p:/SyntaxError.*invalid syntax/i,f:()=>'<strong>SyntaxError: Python can\'t read this line</strong><br>Common causes: missing <code>:</code> after <code>if</code>/<code>for</code>/<code>def</code>, mismatched brackets <code>()</code>, or a typo in a keyword like <code>pront</code> instead of <code>print</code>.'},
  {p:/TypeError.*unsupported operand.*str.*int/i,f:()=>'<strong>TypeError: Can\'t mix text and numbers</strong><br>You tried to do maths with a string. If you used <code>input()</code>, convert it first: <code>age = int(input("Age: "))</code>'},
  {p:/TypeError.*'(.+?)' object is not callable/i,f:m=>'<strong>TypeError: <code>'+m[1]+'</code> is not a function</strong><br>You tried to call something with <code>()</code> but it isn\'t a function. Did you accidentally do something like <code>print = 5</code> which overwrites the real <code>print</code>?'},
  {p:/IndentationError/i,f:()=>'<strong>IndentationError: Spacing problem</strong><br>Python uses indentation to group code. Everything inside an <code>if</code>, <code>for</code>, or <code>def</code> must be indented consistently (4 spaces is standard). Check your spacing is the same on all lines in that block.'},
  {p:/ZeroDivisionError/i,f:()=>'<strong>ZeroDivisionError: Division by zero</strong><br>You divided something by zero. Check your denominator — it might be a variable that ended up as 0.'},
  {p:/IndexError.*list index out of range/i,f:()=>'<strong>IndexError: Index out of range</strong><br>You accessed an index that doesn\'t exist. Lists start at <code>0</code>, so a 3-item list has indices <code>0</code>, <code>1</code>, <code>2</code> — there is no index <code>3</code>!'},
  {p:/KeyError: (.+)/i,f:m=>'<strong>KeyError: Key '+m[1]+' not in dictionary</strong><br>You tried to access a dictionary key that doesn\'t exist. Use <code>.get(key)</code> instead of <code>[key]</code> to safely handle missing keys.'},
  {p:/AttributeError.*'(.+?)' object has no attribute '(.+?)'/i,f:m=>'<strong>AttributeError: <code>'+m[2]+'</code> doesn\'t exist on <code>'+m[1]+'</code></strong><br>Check the spelling, and make sure you\'re calling the right method on the right type of object.'},
  {p:/ModuleNotFoundError.*No module named '(.+?)'/i,f:m=>'<strong>ModuleNotFoundError: <code>'+m[1]+'</code> not available here</strong><br>Third-party packages like <code>numpy</code> or <code>pandas</code> can\'t be installed in the browser. Built-ins like <code>math</code>, <code>random</code>, and <code>datetime</code> work fine though.'},
  {p:/TypeError.*takes (\d+) positional argument/i,f:m=>'<strong>TypeError: Wrong number of arguments</strong><br>Your function call doesn\'t match the function\'s definition. Check how many parameters it expects.'},
];

function etip(msg){
  for(const e of ETIPS){const m=msg.match(e.p);if(m)return e.f(m);}
  return '<strong>Something went wrong</strong><br>Read the error message above carefully — Python usually tells you the exact line and what failed. Fix that line and try again.';
}

      .replace(/^[ \t]*#[^\n]*/gm,'')
      .replace(/\binput\s*\(/g,'__inp(')
      .replace(/\btype\s*\(([^)]+)\)/g,'(__typ($1))');
    new Function('print','__inp','__typ',code)(
      fp,
      p=>{fp('\u2192 '+(p||'')+'[browser: returning sample value "15"]');return '15';},
      v=>{
        if(v===null)return "<class 'NoneType'>";
        const t=typeof v;
        if(t==='number')return Number.isInteger(v)?"<class 'int'>":"<class 'float'>";
        if(t==='string')return "<class 'str'>";
        if(t==='boolean')return "<class 'bool'>";
        if(Array.isArray(v))return "<class 'list'>";
        return "<class 'object'>";
      }
    );
    out.textContent=lines.length?lines.join('\n'):'(no output — did you use print()?)';
  }catch(e){
    out.className='out err';
    out.textContent='\u274C '+e.message;
    et.innerHTML=etip(e.message);
    et.style.display='block';
  }
}

function mark(n){
  if(n>0){done.add(n);localStorage.setItem('pd',JSON.stringify([...done]));}
  upd();
}

function go(n){
  cur=n;
  const m=document.getElementById('main');
  m.scrollTop=0;
  if(n===0){showWelcome();upd();return;}
  const d=C[String(n)];
  if(!d){m.innerHTML='<div class="page"><p>Not found.</p></div>';return;}
  const id='c'+n;
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  let h='<div class="page">'
    +'<div class="ltag">Chapter '+n+'</div>'
    +'<div class="ltitle">'+d.t+'</div>'
    +'<div class="lsub">'+d.s+'</div>';
  if(d.o&&d.o.length)
    h+='<div class="obj"><strong>By the end of this chapter you will:</strong><ul>'+d.o.map(x=>'<li>'+x+'</li>').join('')+'</ul></div>';
  h+='<div class="body">'+d.h+'</div>';
  const ce=esc(d.c||'print("Hello!")');
  h+='<div class="scratch-wrap">'
    +'<div class="scratch-head">'
    +'<div class="scratch-left"><strong>&#9998; Try it yourself</strong><span>edit the code below, then press Run</span></div>'
    +'<button class="run-btn" onclick="run(\''+id+'\')">&#9654; Run</button>'
    +'</div>'
    +'<div class="scratch-body">'
    +'<textarea class="ed" id="ta'+id+'" spellcheck="false" autocorrect="off" autocapitalize="off" autocomplete="off">'+ce+'</textarea>'
    +'<div class="out-wrap"><div class="out-lbl">Output</div><div class="out" id="out'+id+'">Press Run to see the result</div></div>'
    +'<div class="etip" id="et'+id+'"></div>'
    +'</div></div>';
  h+='</div>'
    +'<div class="bnav">'
    +'<button class="nbtn" onclick="go('+(n-1)+')" '+(n<=1?'disabled':'')+'>&larr; Back</button>'
    +'<button class="nbtn p" onclick="mark('+n+');go('+(n<52?n+1:n)+')">Done &amp; Next &rarr;</button>'
    +'</div>';
  m.innerHTML=h;
  upd();
}

function showWelcome(){
  document.getElementById('main').innerHTML='<div class="wlc">'
    +'<h2>Welcome to Python! &#10024;</h2>'
    +'<p>All 52 chapters from your handbook. Read the explanation, look at the examples, then edit and run the code yourself. If anything breaks, you\'ll get a plain-English explanation right there so you know what to fix.</p>'
    +'<div class="wgrid">'
    +'<div class="wcard"><div class="ic">&#128214;</div><h3>52 Chapters</h3><p>Full content from your handbook</p></div>'
    +'<div class="wcard"><div class="ic">&#9998;</div><h3>Live Code</h3><p>Edit and run Python on every page</p></div>'
    +'<div class="wcard"><div class="ic">&#128161;</div><h3>Error Help</h3><p>Friendly explanation whenever something goes wrong</p></div>'
    +'<div class="wcard"><div class="ic">&#128202;</div><h3>Progress</h3><p>Saved automatically on your device</p></div>'
    +'</div>'
    +'<button class="sbtn" onclick="go(1)">Start &rarr; Chapter 1</button>'
    +'</div>';
}

upd(); go(0);
