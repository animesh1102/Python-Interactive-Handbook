<script>
const CHAPTERS={"1": {"title": "What Is Programming?", "subtitle": "Understanding what code actually is", "objectives": ["Explain what a program is and what programming means", "Describe how a computer follows instructions", "Understand the difference between hardware and software", "Explain why Python is a good first language"], "html": "<h3>Learning Objectives</h3>\n<p>By the end of this chapter you will be able to:</p>\n<ul>\n<li>Explain what a program is and what programming means.</li>\n<li>Describe how a computer follows instructions.</li>\n<li>Understand the difference between hardware and software.</li>\n<li>Explain why Python is a good first language.</li>\n</ul>\n<hr class=\"lesson-divider\">\n<h3>1.1 The Core Idea</h3>\n<p>Imagine you are writing a recipe for someone who has never cooked before and is incapable of improvising. Every step must be written down. The person follows your instructions literally and exactly. If you write \"add a handful of salt,\" they will be confused, because they do not know how big a handful is. If you write \"add 5 grams of salt,\" they can follow that.</p>\n<p>A computer is that person. It is extraordinarily capable \u2014 it can perform billions of operations per second \u2014 but it will only do exactly what you tell it. Programming is the act of writing those instructions in a language that both you and the computer can understand.</p>\n<p>A <strong>program</strong> is a set of instructions that tells a computer what to do. A <strong>programming language</strong> is the formal system of rules and vocabulary used to write those instructions.</p>\n<hr class=\"lesson-divider\">\n<h3>1.2 Why Computers Need a Special Language</h3>\n<p>Computers, at their lowest level, understand only one thing: electricity. Specifically, they understand whether a circuit is carrying electricity or not. This gives us two states: <strong>on</strong> and <strong>off</strong>, which we represent as <strong>1</strong> and <strong>0</strong>. Every piece of data and every instruction inside a computer is ultimately stored as a long sequence of ones and zeros. This is called <strong>binary</strong>.</p>\n<p>Writing instructions in binary is possible but extremely tedious. An instruction to add two numbers might look like:</p>\n<div class=\"code-block\"><pre class=\"code-content\">00000001 00000010 00000011</pre></div>\n<p>Nobody writes programs this way today. Instead, we use <strong>programming languages</strong> \u2014 systems that let us write instructions in something much closer to human language.</p>\n<p>A special program called a <strong>compiler</strong> or <strong>interpreter</strong> translates your human-readable code into the binary instructions the computer actually runs.</p>\n<hr class=\"lesson-divider\">\n<h3>1.3 High-Level vs. Low-Level Languages</h3>\n<p>Programming languages exist on a spectrum.</p>\n<div class=\"table-wrap\"><table>\n<tr><th>Level</th><th>Example Languages</th><th>Resembles</th></tr>\n<tr><td>Machine code</td><td>Binary</td><td>Raw electricity</td></tr>\n<tr><td>Assembly</td><td>ASM</td><td>Very low-level instructions</td></tr>\n<tr><td>Low-level</td><td>C, C++</td><td>Detailed, close to hardware</td></tr>\n<tr><td>High-level</td><td>Python, Java</td><td>Closer to English</td></tr>\n</table></div>\n<p>Python sits near the top of this spectrum. It reads almost like plain English. This means it takes longer to run than C (because more translation is needed), but it is far easier to write and understand.</p>\n<p>For engineering, data analysis, scripting, and most applications, Python's speed is more than adequate. When you need raw speed for numerically intensive work, libraries like NumPy (which we cover in Chapter 41) give you Python's convenience with C-level performance underneath.</p>\n<hr class=\"lesson-divider\">\n<h3>1.4 What Makes Python Special?</h3>\n<p>Python was created by Guido van Rossum and first released in 1991. It was designed with one guiding principle: <strong>code should be readable</strong>. Guido wanted a language that felt clean and uncluttered, where you spend your time solving problems rather than fighting the language.</p>\n<p>Python has several properties that make it excellent for beginners and professionals alike:</p>\n<p><strong>Readable syntax.</strong> Python uses plain English words like <code>for</code>, <code>if</code>, <code>while</code>, <code>and</code>, <code>not</code>, <code>in</code>, and <code>is</code>. Code written today is readable years later.</p>\n<p><strong>Interpreted.</strong> Python does not need to be compiled before running. You write code, run it, and see results immediately. This makes experimentation easy.</p>\n<p><strong>Dynamically typed.</strong> You do not have to declare the type of a variable before using it. Python figures it out. (We explore this fully in Chapter 6.)</p>\n<p><strong>Enormous standard library.</strong> Python ships with a massive collection of pre-written tools for everything from file handling to web servers.</p>\n<p><strong>Vast ecosystem.</strong> The community has built hundreds of thousands of third-party packages covering data science, machine learning, web development, automation, and much more.</p>\n<p><strong>Cross-platform.</strong> Python runs on Windows, macOS, and Linux without modification.</p>\n<hr class=\"lesson-divider\">\n<h3>1.5 What Can Python Do?</h3>\n<p>To understand the scope of Python, consider these real applications:</p>\n<ul>\n<li><strong>NASA</strong> uses Python for scientific data analysis.</li>\n<li><strong>Instagram</strong> and <strong>Dropbox</strong> are built with Python.</li>\n<li><strong>CERN</strong> uses Python for particle physics data analysis.</li>\n<li><strong>Google</strong> uses Python extensively in its infrastructure.</li>\n<li><strong>Airbus and Boeing</strong> engineering teams use Python for data processing and simulation scripting.</li>\n</ul>\n<p>For you as an engineer, Python is immediately useful for: automating repetitive calculations, reading and plotting data, running numerical simulations, processing test results, and building tools for your team.</p>\n<hr class=\"lesson-divider\">\n<h3>1.6 Mental Model: The Computer as a Machine</h3>\n<p>Think of a computer as a machine with four main parts:</p>", "code": "# No code example\nprint('Hello!')"}, "2": {"title": "How Python Works", "subtitle": "Under the hood of the interpreter", "objectives": ["Describe what happens when Python runs a program", "Understand what the Python interpreter is", "Explain what bytecode is and why it exists", "Understand how Python's memory model works at a basic level"], "html": "<h3>Learning Objectives</h3>\n<p>By the end of this chapter you will be able to:</p>\n<ul>\n<li>Describe what happens when Python runs a program.</li>\n<li>Understand what the Python interpreter is.</li>\n<li>Explain what bytecode is and why it exists.</li>\n<li>Understand how Python's memory model works at a basic level.</li>\n</ul>\n<hr class=\"lesson-divider\">\n<h3>2.1 The Python Interpreter</h3>\n<p>When you run a Python program, you are not running your code directly. Instead, a program called the <strong>Python interpreter</strong> reads your code, translates it, and executes it. The interpreter is itself a program \u2014 one written in the C programming language.</p>\n<p>Think of the interpreter as a translator in a meeting between you (speaking Python) and the computer (speaking binary). The translator listens to you, converts what you say into something the computer understands, and passes the result on.</p>\n<p>This interpretation happens in two stages:</p>\n<p><strong>Stage 1: Compilation to bytecode.</strong></p>\n<p>The interpreter reads your source code (the <code>.py</code> file you write) and compiles it into an intermediate format called <strong>bytecode</strong>. Bytecode is not human-readable and is not machine code. It is a compact, lower-level representation of your program. Python stores bytecode in <code>.pyc</code> files inside a <code>__pycache__</code> folder.</p>\n<p><strong>Stage 2: Execution by the Python Virtual Machine.</strong></p>\n<p>The bytecode is run by the <strong>Python Virtual Machine (PVM)</strong>, which is part of the interpreter. The PVM reads each bytecode instruction and performs the corresponding operation.</p>\n<div class=\"code-block\"><pre class=\"code-content\">Your .py file\n      \u2193  (Python compiler)\n   Bytecode\n      \u2193  (Python Virtual Machine)\n   Execution</pre></div>\n<p>This two-stage process is why Python is often called an <em>interpreted</em> language, even though a compilation step occurs. The key difference from C++ is that the compilation produces bytecode (not machine code), and the bytecode is run by a virtual machine rather than the processor directly.</p>\n<hr class=\"lesson-divider\">\n<h3>2.2 CPython</h3>\n<p>The most common version of Python is called <strong>CPython</strong> \u2014 named because the interpreter itself is written in the C programming language. When someone says \"Python,\" they almost always mean CPython.</p>\n<p>Other implementations exist (PyPy, Jython, MicroPython), but CPython is the reference and the one you will install.</p>\n<hr class=\"lesson-divider\">\n<h3>2.3 Python's Memory Model</h3>\n<p>Understanding how Python stores data helps you avoid bugs and write efficient code.</p>\n<p><strong>Everything is an object.</strong></p>\n<p>In Python, everything \u2014 numbers, text, lists, functions, even the program itself \u2014 is an <strong>object</strong>. An object is a bundle of data and behaviour stored in memory. When you write <code>x = 5</code>, Python creates an object in memory that holds the value 5, and <code>x</code> is a name that points to that object.</p>\n<p><strong>Names and References.</strong></p>\n<p>Python variables are not boxes that hold values. They are <strong>labels</strong> (or references) attached to objects. This is a crucial mental model:</p>\n<div class=\"code-block\"><pre class=\"code-content\">x = 5</pre></div>\n<p>This does not put 5 inside x. It creates an integer object with value 5 somewhere in memory, and attaches the name <code>x</code> to it.</p>\n<div class=\"code-block\"><pre class=\"code-content\">x = 5\ny = x</pre></div>\n<p>Now both <code>x</code> and <code>y</code> refer to the <em>same</em> object. No copy is made.</p>\n<p><strong>Garbage Collection.</strong></p>\n<p>Python automatically manages memory. When an object has no names pointing to it, Python's <strong>garbage collector</strong> reclaims that memory. You do not need to manually free memory (unlike in C).</p>\n<hr class=\"lesson-divider\">\n<h3>2.4 The REPL</h3>\n<p>Python provides an interactive mode called the <strong>REPL</strong> (Read-Evaluate-Print Loop). You type one line, Python evaluates it immediately, and prints the result.</p>\n<div class=\"code-block\"><pre class=\"code-content\">&gt;&gt;&gt; 2 + 3\n5\n&gt;&gt;&gt; \"hello\"\n'hello'\n&gt;&gt;&gt; 10 / 3\n3.3333333333333335</pre></div>\n<p>The REPL is an extremely useful tool for experimenting. Think of it as a calculator that can also run programs. You will use it constantly when learning.</p>\n<hr class=\"lesson-divider\">\n<h3>2.5 Python Versions</h3>\n<p>Python has two major version families: <strong>Python 2</strong> and <strong>Python 3</strong>. Python 2 reached end-of-life in January 2020 and should not be used for new projects.</p>\n<p>This handbook uses <strong>Python 3</strong>, specifically Python 3.10 or later. If you see online tutorials using <code>print \"hello\"</code> without parentheses, they are using Python 2. Ignore them and use Python 3.</p>\n<p>Always verify your Python version:</p>\n<div class=\"code-block\"><pre class=\"code-content\">python --version</pre></div>\n<hr class=\"lesson-divider\">", "code": "# No code example\nprint('Hello!')"}, "3": {"title": "Installing Python and VS Code", "subtitle": "Setting up your coding environment", "objectives": ["Install Python 3 on your operating system", "Install and configure VS Code", "Run Python from the terminal", "Create and run your first Python file"], "html": "<h3>Learning Objectives</h3>\n<p>By the end of this chapter you will be able to:</p>\n<ul>\n<li>Install Python 3 on your operating system.</li>\n<li>Install and configure VS Code.</li>\n<li>Run Python from the terminal.</li>\n<li>Create and run your first Python file.</li>\n</ul>\n<hr class=\"lesson-divider\">\n<h3>3.1 Installing Python</h3>\n<p><strong>Windows:</strong></p>\n<ol>\n<li>Visit [https://www.python.org/downloads/](https://www.python.org/downloads/).</li>\n<li>Click the large \"Download Python 3.x.x\" button.</li>\n<li>Run the installer.</li>\n<li><strong>Critical step:</strong> Tick the box that says \"Add Python to PATH\" before clicking Install.</li>\n<li>Click \"Install Now.\"</li>\n</ol>\n<p><strong>macOS:</strong></p>\n<ol>\n<li>Visit [https://www.python.org/downloads/](https://www.python.org/downloads/).</li>\n<li>Download the macOS installer and run it.</li>\n<li>Alternatively, if you have Homebrew: open Terminal and run <code>brew install python3</code>.</li>\n</ol>\n<p><strong>Linux (Ubuntu/Debian):</strong></p>\n<p>Python 3 is usually pre-installed. Check with:</p>\n<div class=\"code-block\"><pre class=\"code-content\">python3 --version</pre></div>\n<p>If not installed:</p>\n<div class=\"code-block\"><pre class=\"code-content\">sudo apt update\nsudo apt install python3 python3-pip</pre></div>\n<hr class=\"lesson-divider\">\n<h3>3.2 Verifying the Installation</h3>\n<p>Open a terminal (Command Prompt on Windows, Terminal on macOS/Linux) and type:</p>\n<div class=\"code-block\"><pre class=\"code-content\">python --version</pre></div>\n<p>or on macOS/Linux:</p>\n<div class=\"code-block\"><pre class=\"code-content\">python3 --version</pre></div>\n<p>You should see something like:</p>\n<div class=\"code-block\"><pre class=\"code-content\">Python 3.11.4</pre></div>\n<p>If you see an error, Python is not correctly installed or not on your PATH. Reinstall and ensure you tick \"Add Python to PATH\" on Windows.</p>\n<hr class=\"lesson-divider\">\n<h3>3.3 Installing VS Code</h3>\n<p><strong>VS Code</strong> (Visual Studio Code) is a free, lightweight code editor made by Microsoft. It is the most popular editor for Python development.</p>\n<ol>\n<li>Visit [https://code.visualstudio.com/](https://code.visualstudio.com/).</li>\n<li>Download for your operating system and install it.</li>\n<li>Open VS Code.</li>\n</ol>\n<hr class=\"lesson-divider\">\n<h3>3.4 Setting Up VS Code for Python</h3>\n<ol>\n<li>Open VS Code.</li>\n<li>Press <code>Ctrl+Shift+X</code> (Windows/Linux) or <code>Cmd+Shift+X</code> (macOS) to open the Extensions panel.</li>\n<li>Search for \"Python\" and install the extension by Microsoft.</li>\n<li>Press <code>Ctrl+Shift+P</code> and type \"Python: Select Interpreter.\" Choose your Python 3 installation.</li>\n</ol>\n<p>You are now ready.</p>\n<hr class=\"lesson-divider\">\n<h3>3.5 The Integrated Terminal</h3>\n<p>VS Code has a built-in terminal. Open it with:</p>\n<ul>\n<li>Menu: Terminal \u2192 New Terminal</li>\n<li>Shortcut: <code>Ctrl+</code><code> </code> (backtick)</li>\n</ul>\n<p>This terminal is where you will run Python programs throughout this handbook.</p>\n<hr class=\"lesson-divider\">\n<h3>3.6 Useful VS Code Shortcuts</h3>\n<div class=\"table-wrap\"><table>\n<tr><th>Action</th><th>Windows/Linux</th><th>macOS</th></tr>\n<tr><td>Open file</td><td>Ctrl+O</td><td>Cmd+O</td></tr>\n<tr><td>Save file</td><td>Ctrl+S</td><td>Cmd+S</td></tr>\n<tr><td>Open terminal</td><td>Ctrl+`</td><td>Cmd+`</td></tr>\n<tr><td>Run selection</td><td>Shift+Enter</td><td>Shift+Enter</td></tr>\n<tr><td>Find</td><td>Ctrl+F</td><td>Cmd+F</td></tr>\n<tr><td>Format document</td><td>Shift+Alt+F</td><td>Shift+Option+F</td></tr>\n</table></div>\n<hr class=\"lesson-divider\">", "code": "# No code example\nprint('Hello!')"}, "4": {"title": "Running Your First Program", "subtitle": "print(), comments, and syntax errors", "objectives": ["Write and run a Python script", "Use the `print()` function", "Understand comments", "Run programs in both the REPL and from a file"], "html": "<h3>Learning Objectives</h3>\n<p>By the end of this chapter you will be able to:</p>\n<ul>\n<li>Write and run a Python script.</li>\n<li>Use the <code>print()</code> function.</li>\n<li>Understand comments.</li>\n<li>Run programs in both the REPL and from a file.</li>\n</ul>\n<hr class=\"lesson-divider\">\n<h3>4.1 The print() Function</h3>\n<p>The most fundamental action in any programming language is output \u2014 sending information to the screen. In Python, this is done with the <code>print()</code> function.</p>\n<p>A <strong>function</strong> is a named, reusable block of code. You call a function by writing its name followed by parentheses. Whatever you put inside the parentheses is called an <strong>argument</strong> \u2014 data you are passing to the function.</p>\n<div class=\"code-block\"><pre class=\"code-content\">print(\"Hello, World!\")</pre></div>\n<p>When Python runs this line:</p>\n<ol>\n<li>It sees <code>print</code> \u2014 a function.</li>\n<li>It sees <code>\"Hello, World!\"</code> \u2014 a piece of text (called a <strong>string</strong>, which we cover in Chapter 9).</li>\n<li>It calls the function with that text as the argument.</li>\n<li>The function displays the text on the screen.</li>\n</ol>\n<p><strong>Output:</strong></p>\n<div class=\"code-block\"><pre class=\"code-content\">Hello, World!</pre></div>\n<hr class=\"lesson-divider\">\n<h3>4.2 Your First Program</h3>\n<p>Create a new file in VS Code. Name it <code>hello.py</code>. Type the following:</p>\n<div class=\"code-block\"><pre class=\"code-content\"># My first Python program\n# The print() function displays text on the screen\n\nprint(\"Hello, World!\")\nprint(\"My name is Animesh.\")\nprint(\"I am learning Python.\")</pre></div>\n<p>Save the file (<code>Ctrl+S</code>). Open the terminal and run:</p>\n<div class=\"code-block\"><pre class=\"code-content\">python hello.py</pre></div>\n<p><strong>Output:</strong></p>\n<div class=\"code-block\"><pre class=\"code-content\">Hello, World!\nMy name is Animesh.\nI am learning Python.</pre></div>\n<p>Each <code>print()</code> call displays one line of output. Python runs the program from top to bottom, line by line.</p>\n<hr class=\"lesson-divider\">\n<h3>4.3 Comments</h3>\n<p>Lines beginning with <code>#</code> are <strong>comments</strong>. Python ignores them completely. They exist for human readers \u2014 yourself and others who read your code later.</p>\n<div class=\"code-block\"><pre class=\"code-content\"># This is a comment. Python will not run this line.\nprint(\"Python runs this line.\")  # This is an inline comment</pre></div>\n<p>Good commenting is a professional habit. In this handbook, comments explain every important step in every code example.</p>\n<hr class=\"lesson-divider\">\n<h3>4.4 Multiple Arguments in print()</h3>\n<p><code>print()</code> can accept multiple arguments, separated by commas:</p>\n<div class=\"code-block\"><pre class=\"code-content\">print(\"The speed of sound is\", 343, \"metres per second.\")</pre></div>\n<p><strong>Output:</strong></p>\n<div class=\"code-block\"><pre class=\"code-content\">The speed of sound is 343 metres per second.</pre></div>\n<p>Python automatically puts a space between each argument.</p>\n<p>You can change the separator using the <code>sep</code> argument:</p>\n<div class=\"code-block\"><pre class=\"code-content\">print(\"day\", \"month\", \"year\", sep=\"/\")</pre></div>\n<p><strong>Output:</strong></p>\n<div class=\"code-block\"><pre class=\"code-content\">day/month/year</pre></div>\n<p>And you can change what gets printed at the end of a line using <code>end</code>:</p>\n<div class=\"code-block\"><pre class=\"code-content\">print(\"Loading\", end=\"...\")\nprint(\"Done.\")</pre></div>\n<p><strong>Output:</strong></p>\n<div class=\"code-block\"><pre class=\"code-content\">Loading...Done.</pre></div>\n<p>By default, <code>print()</code> adds a newline character <code>\\n</code> at the end, which moves the cursor to the next line. Setting <code>end=\"\"</code> removes that newline.</p>\n<hr class=\"lesson-divider\">\n<h3>4.5 Print with Numbers and Arithmetic</h3>\n<p><code>print()</code> can display numbers and the results of calculations:</p>\n<div class=\"code-block\"><pre class=\"code-content\">print(42)           # prints an integer\nprint(3.14159)      # prints a decimal number\nprint(10 + 5)       # prints 15\nprint(100 / 4)      # prints 25.0\nprint(2 ** 10)      # prints 1024 (2 to the power of 10)</pre></div>\n<hr class=\"lesson-divider\">\n<h3>4.6 A Slightly More Useful Program</h3>\n<p>Let us write a program that calculates and displays a simple aircraft performance metric.</p>\n<div class=\"code-block\"><pre class=\"code-content\"># Program: Simple wing loading calculator\n# Wing loading = Aircraft weight / Wing area\n# Units: Newtons and square metres \u2192 N/m\u00b2\n\n# Aircraft parameters\nweight_n = 75000        # Aircraft weight in Newtons\nwing_area_m2 = 122.6    # Wing area in square metres\n\n# Calculate wing loading\nwing_loading = weight_n / wing_area_m2\n\n# Display result\nprint(\"Wing Loading Calculator\")\nprint(\"------------------------\")\nprint(\"Aircraft weight:\", weight_n, \"N\")\nprint(\"Wing area:\", wing_area_m2, \"m\u00b2\")\nprint(\"Wing loading:\", wing_loading, \"N/m\u00b2\")</pre></div>\n<p><strong>Output:</strong></p>\n<div class=\"code-block\"><pre class=\"code-content\">Wing Loading Calculator\n------------------------\nAircraft weight: 75000 N\nWing area: 122.6 m\u00b2\nWing loading: 611.7... N/m\u00b2</pre></div>\n<p>This is already a genuinely useful tool.</p>\n<hr class=\"lesson-divider\">", "code": "# My first Python program\n# The print() function displays text on the screen\n\nprint(\"Hello, World!\")\nprint(\"My name is Animesh.\")\nprint(\"I am learning Python.\")"}, "5": {"title": "Variables", "subtitle": "Giving names to values in memory", "objectives": ["Create and use variables", "Update variable values", "Name variables following Python conventions", "Use variables in calculations"], "html": "<h3>Learning Objectives</h3>\n<p>By the end of this chapter you will be able to:</p>\n<ul>\n<li>Create and use variables.</li>\n<li>Update variable values.</li>\n<li>Name variables following Python conventions.</li>\n<li>Use variables in calculations.</li>\n</ul>\n<hr class=\"lesson-divider\">\n<h3>5.1 The Problem Variables Solve</h3>\n<p>Consider this program:</p>\n<div class=\"code-block\"><pre class=\"code-content\">print(75000 / 122.6)\nprint(75000 * 9.81)\nprint(75000 + 1500)</pre></div>\n<p>What does <code>75000</code> represent? Is it a mass? A force? A price? Without context, this code is meaningless to anyone reading it \u2014 including you, three months later.</p>\n<p>Variables solve this problem by giving names to values.</p>\n<hr class=\"lesson-divider\">\n<h3>5.2 What Is a Variable?</h3>\n<p>A <strong>variable</strong> is a name that refers to a value stored in memory.</p>\n<div class=\"code-block\"><pre class=\"code-content\">aircraft_weight = 75000</pre></div>\n<p>This line does three things:</p>\n<ol>\n<li>Creates an integer object with value <code>75000</code> in memory.</li>\n<li>Creates a name <code>aircraft_weight</code>.</li>\n<li>Binds the name to the object.</li>\n</ol>\n<p>Now you can use <code>aircraft_weight</code> anywhere in your program instead of the raw number.</p>\n<div class=\"code-block\"><pre class=\"code-content\">aircraft_weight = 75000    # Weight of the aircraft in Newtons\nwing_area = 122.6          # Wing area in square metres\n\nwing_loading = aircraft_weight / wing_area\n\nprint(\"Wing loading:\", wing_loading, \"N/m\u00b2\")</pre></div>\n<p>This is dramatically clearer than raw numbers.</p>\n<hr class=\"lesson-divider\">\n<h3>5.3 Assignment</h3>\n<p>The <code>=</code> symbol in Python is the <strong>assignment operator</strong>. It does not mean \"equals\" in the mathematical sense. It means \"assign the value on the right to the name on the left.\"</p>\n<div class=\"code-block\"><pre class=\"code-content\">x = 10       # Assign the value 10 to the name x\nx = 20       # Reassign x to point to 20 instead</pre></div>\n<p>After the second line, <code>x</code> refers to <code>20</code>. The old object (<code>10</code>) may be garbage-collected if nothing else refers to it.</p>\n<hr class=\"lesson-divider\">\n<h3>5.4 Variable Naming Rules</h3>\n<p>Python has strict rules about variable names:</p>\n<div class=\"table-wrap\"><table>\n<tr><th>Rule</th><th>Example</th></tr>\n<tr><td>Letters, digits, underscores only</td><td><code>mass_kg</code>, <code>speed2</code>, <code>_temp</code></td></tr>\n<tr><td>Cannot start with a digit</td><td>\u274c <code>2speed</code></td></tr>\n<tr><td>Cannot contain spaces</td><td>\u274c <code>my variable</code></td></tr>\n<tr><td>Cannot use reserved keywords</td><td>\u274c <code>for</code>, <code>if</code>, <code>while</code></td></tr>\n<tr><td>Case-sensitive</td><td><code>Speed</code> \u2260 <code>speed</code></td></tr>\n</table></div>\n<p><strong>Convention (PEP 8 style guide):</strong></p>\n<ul>\n<li>Use lowercase letters with underscores: <code>wing_area</code>, not <code>WingArea</code> or <code>wingArea</code>.</li>\n<li>Choose descriptive names: <code>fuel_mass_kg</code> rather than <code>f</code>.</li>\n<li>Keep names short enough to type but long enough to understand.</li>\n</ul>\n<div class=\"code-block\"><pre class=\"code-content\"># Good variable names\ntakeoff_mass_kg = 78000\ncruise_altitude_ft = 35000\nmach_number = 0.82\n\n# Poor variable names (legal but unreadable)\nx = 78000\na = 35000\nm = 0.82</pre></div>\n<hr class=\"lesson-divider\">\n<h3>5.5 Reserved Keywords</h3>\n<p>These words have special meaning in Python and cannot be used as variable names:</p>\n<div class=\"code-block\"><pre class=\"code-content\">False   None    True    and     as      assert  async   await\nbreak   class   continue def     del     elif    else    except\nfinally for     from    global  if      import  in      is\nlambda  nonlocal not     or      pass    raise   return  try\nwhile   with    yield</pre></div>\n<hr class=\"lesson-divider\">\n<h3>5.6 Updating Variables</h3>\n<p>Variables can be updated by reassigning them:</p>\n<div class=\"code-block\"><pre class=\"code-content\">fuel_kg = 20000         # Initial fuel load\n\nprint(\"Initial fuel:\", fuel_kg, \"kg\")\n\nfuel_kg = fuel_kg - 5000    # Burn 5000 kg during climb\nprint(\"After climb:\", fuel_kg, \"kg\")\n\nfuel_kg = fuel_kg - 8000    # Burn 8000 kg during cruise\nprint(\"After cruise:\", fuel_kg, \"kg\")</pre></div>\n<p><strong>Output:</strong></p>\n<div class=\"code-block\"><pre class=\"code-content\">Initial fuel: 20000 kg\nAfter climb: 15000 kg\nAfter cruise: 7000 kg</pre></div>\n<p>The expression <code>fuel_kg = fuel_kg - 5000</code> means: take the current value of <code>fuel_kg</code>, subtract 5000, and store the result back into <code>fuel_kg</code>.</p>\n<hr class=\"lesson-divider\">\n<h3>5.7 Augmented Assignment Operators</h3>\n<p>Because updating a variable based on its own value is common, Python provides <strong>augmented assignment operators</strong> as shortcuts:</p>\n<div class=\"table-wrap\"><table>\n<tr><th>Long form</th><th>Shorthand</th><th>Meaning</th></tr>\n<tr><td><code>x = x + 5</code></td><td><code>x += 5</code></td><td>Add 5 to x</td></tr>\n<tr><td><code>x = x - 5</code></td><td><code>x -= 5</code></td><td>Subtract 5 from x</td></tr>\n<tr><td><code>x = x * 2</code></td><td><code>x *= 2</code></td><td>Multiply x by 2</td></tr>\n<tr><td><code>x = x / 2</code></td><td><code>x /= 2</code></td><td>Divide x by 2</td></tr>\n<tr><td><code>x = x ** 2</code></td><td><code>x **= 2</code></td><td>Square x</td></tr>\n</table></div>\n<div class=\"code-block\"><pre class=\"code-content\">fuel_kg = 20000\nfuel_kg -= 5000     # Equivalent to: fuel_kg = fuel_kg - 5000\nprint(fuel_kg)      # 15000</pre></div>\n<hr class=\"lesson-divider\">\n<h3>5.8 Multiple Assignment</h3>\n<p>Python allows several assignment styles:</p>\n<div class=\"code-block\"><pre class=\"code-content\"># Assign the same value to multiple names at once\nx = y = z = 0\n\n# Assign multiple values in one line (called tuple unpacking)\nlength, width, height = 10, 5, 3\n\nprint(length)   # 10\nprint(width)    # 5\nprint(height)   # 3</pre></div>\n<p>The second form is particularly useful when a function returns multiple values (covered in Chapter 17).</p>\n<hr class=\"lesson-divider\">\n<h3>5.9 Practical Example</h3>", "code": "print(75000 / 122.6)\nprint(75000 * 9.81)\nprint(75000 + 1500)"}, "6": {"title": "Data Types", "subtitle": "int, float, str, bool \u2014 the building blocks", "objectives": ["Identify Python's core built-in data types", "Understand what a data type is and why it matters", "Convert between types using type conversion functions", "Use the `type()` function to inspect types"], "html": "<h3>Learning Objectives</h3>\n<p>By the end of this chapter you will be able to:</p>\n<ul>\n<li>Identify Python's core built-in data types.</li>\n<li>Understand what a data type is and why it matters.</li>\n<li>Convert between types using type conversion functions.</li>\n<li>Use the <code>type()</code> function to inspect types.</li>\n</ul>\n<hr class=\"lesson-divider\">\n<h3>6.1 What Is a Data Type?</h3>\n<p>Not all data is the same. The number <code>42</code> and the word <code>\"hello\"</code> are stored differently in memory and support different operations. You can divide <code>42 / 2</code>, but you cannot divide <code>\"hello\" / 2</code>.</p>\n<p>A <strong>data type</strong> defines what kind of value an object holds and what operations can be performed on it. Python figures out the type automatically from how you write the value. This is called <strong>dynamic typing</strong>.</p>\n<hr class=\"lesson-divider\">\n<h3>6.2 The Core Built-in Types</h3>\n<div class=\"table-wrap\"><table>\n<tr><th>Type</th><th>Name</th><th>Examples</th></tr>\n<tr><td>Integer</td><td><code>int</code></td><td><code>0</code>, <code>42</code>, <code>-7</code>, <code>1000000</code></td></tr>\n<tr><td>Float</td><td><code>float</code></td><td><code>3.14</code>, <code>-0.5</code>, <code>1.0e8</code></td></tr>\n<tr><td>String</td><td><code>str</code></td><td><code>\"hello\"</code>, <code>'Python'</code>, <code>\"42\"</code></td></tr>\n<tr><td>Boolean</td><td><code>bool</code></td><td><code>True</code>, <code>False</code></td></tr>\n<tr><td>None</td><td><code>NoneType</code></td><td><code>None</code></td></tr>\n</table></div>\n<p>We will explore collections (lists, tuples, sets, dictionaries) in later chapters.</p>\n<hr class=\"lesson-divider\">\n<h3>6.3 Integers (int)</h3>\n<p>An <strong>integer</strong> is a whole number \u2014 positive, negative, or zero \u2014 with no decimal point.</p>\n<div class=\"code-block\"><pre class=\"code-content\">altitude_ft = 35000      # Positive integer\ntemperature_c = -56      # Negative integer\nyear = 2024              # Another integer\n\nprint(type(altitude_ft))     # &lt;class 'int'&gt;</pre></div>\n<p>Python integers have <strong>unlimited precision</strong> \u2014 they can be as large as your memory allows:</p>\n<div class=\"code-block\"><pre class=\"code-content\">enormous_number = 10 ** 100     # A googol \u2014 perfectly valid in Python\nprint(enormous_number)</pre></div>\n<hr class=\"lesson-divider\">\n<h3>6.4 Floats (float)</h3>\n<p>A <strong>float</strong> (short for <em>floating-point number</em>) is a number with a decimal point.</p>\n<div class=\"code-block\"><pre class=\"code-content\">mach_number = 0.82\npi = 3.14159265358979\ngravity = 9.81         # m/s\u00b2\navogadro = 6.022e23    # Scientific notation: 6.022 \u00d7 10\u00b2\u00b3\n\nprint(type(mach_number))   # &lt;class 'float'&gt;</pre></div>\n<p><strong>Scientific notation</strong> works naturally in Python. <code>6.022e23</code> means <code>6.022 \u00d7 10\u00b2\u00b3</code>.</p>\n<p><strong>Important:</strong> Floats are stored in binary and have limited precision (about 15-17 significant digits). This can cause tiny rounding errors:</p>\n<div class=\"code-block\"><pre class=\"code-content\">print(0.1 + 0.2)   # Prints 0.30000000000000004, not 0.3</pre></div>\n<p>This is normal in all programming languages. For engineering calculations, this rounding is negligible. For financial applications, use the <code>decimal</code> module.</p>\n<hr class=\"lesson-divider\">\n<h3>6.5 Strings (str)</h3>\n<p>A <strong>string</strong> is a sequence of characters \u2014 text. Strings are enclosed in single quotes or double quotes (Python treats them identically):</p>\n<div class=\"code-block\"><pre class=\"code-content\">aircraft_name = \"Airbus A320neo\"\nairport_code = 'LHR'\nmessage = \"Wing loading: 611 N/m\u00b2\"</pre></div>\n<p>Strings are covered in depth in Chapter 9. For now, the key point is that <code>\"42\"</code> is not the same as <code>42</code>:</p>\n<div class=\"code-block\"><pre class=\"code-content\">number = 42         # An integer\ntext = \"42\"         # A string containing the characters '4' and '2'\n\nprint(number + 1)   # 43 \u2014 arithmetic\nprint(text + \"1\")   # \"421\" \u2014 concatenation (joining strings)</pre></div>\n<hr class=\"lesson-divider\">\n<h3>6.6 Booleans (bool)</h3>\n<p>A <strong>Boolean</strong> has exactly two values: <code>True</code> or <code>False</code>. It represents a yes/no, on/off, pass/fail condition.</p>\n<div class=\"code-block\"><pre class=\"code-content\">is_airborne = True\ngear_retracted = True\nengine_fire = False\n\nprint(type(is_airborne))    # &lt;class 'bool'&gt;</pre></div>\n<p>Booleans are the foundation of decision-making in code. We cover them in depth in Chapter 14.</p>\n<p>Note: Python capitalises the first letter \u2014 <code>True</code> not <code>true</code>, <code>False</code> not <code>false</code>.</p>\n<hr class=\"lesson-divider\">\n<h3>6.7 None (NoneType)</h3>\n<p><code>None</code> represents the <strong>absence of a value</strong>. It is Python's way of saying \"nothing here\" or \"not applicable yet.\"</p>\n<div class=\"code-block\"><pre class=\"code-content\">result = None   # No result yet\n\nprint(result)         # None\nprint(type(result))   # &lt;class 'NoneType'&gt;</pre></div>\n<p><code>None</code> is commonly used as a default value when you do not yet have a result to assign.</p>\n<hr class=\"lesson-divider\">\n<h3>6.8 The type() Function</h3>\n<p>Use <code>type()</code> to inspect the type of any object:</p>\n<div class=\"code-block\"><pre class=\"code-content\">print(type(42))          # &lt;class 'int'&gt;\nprint(type(3.14))        # &lt;class 'float'&gt;\nprint(type(\"hello\"))     # &lt;class 'str'&gt;\nprint(type(True))        # &lt;class 'bool'&gt;\nprint(type(None))        # &lt;class 'NoneType'&gt;</pre></div>\n<p>This is invaluable during debugging.</p>\n<hr class=\"lesson-divider\">\n<h3>6.9 Type Conversion</h3>\n<p>You can convert between types using <strong>type conversion functions</strong>:</p>\n<div class=\"table-wrap\"><table>\n<tr><th>Function</th><th>Converts to</th><th>Example</th></tr>\n<tr><td><code>int()</code></td><td>Integer</td><td><code>int(\"42\")</code> \u2192 <code>42</code></td></tr>\n<tr><td><code>float()</code></td><td>Float</td><td><code>float(\"3.14\")</code> \u2192 <code>3.14</code></td></tr>\n<tr><td><code>str()</code></td><td>String</td><td><code>str(42)</code> \u2192 <code>\"42\"</code></td></tr>\n<tr><td><code>bool()</code></td><td>Boolean</td><td><code>bool(0)</code> \u2192 <code>False</code></td></tr>\n</table></div>\n<div class=\"code-block\"><pre class=\"code-content\"># Convert string input to a number for calculation\naltitude_str = \"35000\"          # This is text, not a number\naltitude_int = int(altitude_str)   # Now it is an integer\n\nprint(altitude_int + 1000)     # 36000 \u2014 works!\nprint(altitude_str + \"1000\")   # \"350001000\" \u2014 string concatenation, not addition!</pre></div>\n<p><strong>What can be converted to int?</strong></p>\n<div class=\"code-block\"><pre class=\"code-content\">int(\"42\")       # \u2713 \"42\" \u2192 42\nint(3.9)        # \u2713 3.9 \u2192 3 (truncates, does not round)\nint(\"hello\")    # \u2717 ValueError \u2014 \"hello\" is not a number</pre></div>\n<p>**Truthiness</p>", "code": "altitude_ft = 35000      # Positive integer\ntemperature_c = -56      # Negative integer\nyear = 2024              # Another integer\n\nprint(type(altitude_ft))     # <class 'int'>"}, "7": {"title": "Input and Output", "subtitle": "Talking to your user", "objectives": ["Accept user input using `input()`", "Format output using f-strings", "Control decimal places in output", "Build interactive programs"], "html": "<h3>Learning Objectives</h3>\n<p>By the end of this chapter you will be able to:</p>\n<ul>\n<li>Accept user input using <code>input()</code>.</li>\n<li>Format output using f-strings.</li>\n<li>Control decimal places in output.</li>\n<li>Build interactive programs.</li>\n</ul>\n<hr class=\"lesson-divider\">\n<h3>7.1 The input() Function</h3>\n<p>Until now, all data in your programs has been written directly in the code. To make programs interactive, you need to accept data from the user while the program is running. The <code>input()</code> function does this.</p>\n<div class=\"code-block\"><pre class=\"code-content\">name = input(\"What is your name? \")\nprint(\"Hello,\", name)</pre></div>\n<p>When this program runs, Python:</p>\n<ol>\n<li>Displays the prompt <code>What is your name? </code> on the screen.</li>\n<li><strong>Pauses</strong> and waits for the user to type something and press Enter.</li>\n<li>Stores whatever the user typed as a <strong>string</strong> in <code>name</code>.</li>\n<li>Continues with the next line.</li>\n</ol>\n<hr class=\"lesson-divider\">\n<h3>7.2 Critical: input() Always Returns a String</h3>\n<p>This is one of the most common beginner errors. No matter what the user types \u2014 numbers, letters, symbols \u2014 <code>input()</code> always returns a <strong>string</strong>.</p>\n<div class=\"code-block\"><pre class=\"code-content\">altitude = input(\"Enter altitude in feet: \")\nprint(type(altitude))    # &lt;class 'str'&gt;\n\n# This will crash:\n# print(altitude + 1000)   # TypeError: can't add str and int\n\n# Correct approach: convert immediately\naltitude = int(input(\"Enter altitude in feet: \"))\nprint(type(altitude))    # &lt;class 'int'&gt;\nprint(altitude + 1000)   # Now works</pre></div>\n<p>The pattern <code>int(input(...))</code> is extremely common. Read it from inside out: first <code>input()</code> collects user text, then <code>int()</code> converts it.</p>\n<hr class=\"lesson-divider\">\n<h3>7.3 A Complete Interactive Program</h3>\n<div class=\"code-block\"><pre class=\"code-content\"># Wing loading calculator with user input\n\nprint(\"=== Wing Loading Calculator ===\")\n\n# Collect inputs \u2014 convert to float for decimal support\nweight = float(input(\"Enter aircraft weight (Newtons): \"))\narea = float(input(\"Enter wing area (square metres): \"))\n\n# Calculate\nwing_loading = weight / area\n\n# Display result\nprint()   # prints a blank line\nprint(\"Results:\")\nprint(\"Wing loading =\", wing_loading, \"N/m\u00b2\")</pre></div>\n<hr class=\"lesson-divider\">\n<h3>7.4 f-Strings: The Best Way to Format Output</h3>\n<p><strong>f-strings</strong> (formatted string literals) are the modern, recommended way to embed values inside strings. They were introduced in Python 3.6.</p>\n<p>To create an f-string, place the letter <code>f</code> immediately before the opening quote. Inside the string, use <code>{curly braces}</code> to embed any Python expression:</p>\n<div class=\"code-block\"><pre class=\"code-content\">name = \"Animesh\"\nage = 25\n\nprint(f\"My name is {name} and I am {age} years old.\")</pre></div>\n<p><strong>Output:</strong></p>\n<div class=\"code-block\"><pre class=\"code-content\">My name is Animesh and I am 25 years old.</pre></div>\n<p>You can embed calculations directly:</p>\n<div class=\"code-block\"><pre class=\"code-content\">radius = 5\nprint(f\"Area of circle with radius {radius} = {3.14159 * radius ** 2}\")</pre></div>\n<p><strong>Output:</strong></p>\n<div class=\"code-block\"><pre class=\"code-content\">Area of circle with radius 5 = 78.53975</pre></div>\n<hr class=\"lesson-divider\">\n<h3>7.5 Controlling Decimal Places</h3>\n<p>f-strings support <strong>format specifiers</strong> \u2014 codes that control how numbers are displayed.</p>\n<p>The general format inside braces is: <code>{value:.Nf}</code> where <code>N</code> is the number of decimal places.</p>\n<div class=\"code-block\"><pre class=\"code-content\">pi = 3.141592653589793\n\nprint(f\"pi = {pi}\")          # 3.141592653589793  (all digits)\nprint(f\"pi = {pi:.2f}\")      # 3.14\nprint(f\"pi = {pi:.4f}\")      # 3.1416\nprint(f\"pi = {pi:.0f}\")      # 3</pre></div>\n<p>For engineering:</p>\n<div class=\"code-block\"><pre class=\"code-content\">wing_loading = 611.743258\n\nprint(f\"Wing loading: {wing_loading:.1f} N/m\u00b2\")    # 611.7 N/m\u00b2\nprint(f\"Wing loading: {wing_loading:.0f} N/m\u00b2\")    # 612 N/m\u00b2</pre></div>\n<p>For large numbers with thousands separators:</p>\n<div class=\"code-block\"><pre class=\"code-content\">population = 1382000000\nprint(f\"Population: {population:,}\")    # 1,382,000,000</pre></div>\n<p>For scientific notation:</p>\n<div class=\"code-block\"><pre class=\"code-content\">avogadro = 6.022e23\nprint(f\"Avogadro's number: {avogadro:.3e}\")   # 6.022e+23</pre></div>\n<hr class=\"lesson-divider\">\n<h3>7.6 Complete Program: Fuel Burn Calculator</h3>\n<div class=\"code-block\"><pre class=\"code-content\"># Interactive fuel burn estimator\n\nprint(\"=== Fuel Burn Estimator ===\")\nprint()\n\n# Get user inputs\ndistance_nm = float(input(\"Enter route distance (nautical miles): \"))\nfuel_per_nm = float(input(\"Enter fuel burn rate (kg per nautical mile): \"))\n\n# Calculate\ntotal_fuel = distance_nm * fuel_per_nm\nfuel_reserve = total_fuel * 0.05   # 5% reserve\n\nprint()\nprint(\"Results:\")\nprint(f\"  Route distance:   {distance_nm:.0f} nm\")\nprint(f\"  Fuel burn rate:   {fuel_per_nm:.2f} kg/nm\")\nprint(f\"  Trip fuel:        {total_fuel:.1f} kg\")\nprint(f\"  5% reserve:       {fuel_reserve:.1f} kg\")\nprint(f\"  Total with res.:  {total_fuel + fuel_reserve:.1f} kg\")</pre></div>\n<hr class=\"lesson-divider\">\n<h3>7.7 Print Formatting: Width and Alignment</h3>\n<p>You can align columns in output:</p>\n<div class=\"code-block\"><pre class=\"code-content\"># Right-align numbers in a column of width 10\nitems = [(\"Fuel\", 18000), (\"Payload\", 19500), (\"Empty weight\", 42500)]\n\nprint(f\"{'Item':&lt;20} {'Mass (kg)':&gt;10}\")\nprint(\"-\" * 32)\nfor item, mass in items:\n    print(f\"{item:&lt;20} {mass:&gt;10,}\")</pre></div>\n<p><strong>Output:</strong></p>\n<div class=\"code-block\"><pre class=\"code-content\">Item                  Mass (kg)\n--------------------------------\nFuel                      18,000\nPayload                   19,500\nEmpty weight              42,500</pre></div>\n<p><em>(Note: We will cover <code>for</code> loops in Chapter 16 \u2014 for now just notice the output format.)</em></p>\n<hr class=\"lesson-divider\">", "code": "name = input(\"What is your name? \")\nprint(\"Hello,\", name)"}, "8": {"title": "Operators", "subtitle": "Arithmetic, comparison, and assignment", "objectives": ["Use all arithmetic operators", "Understand integer division and modulo", "Use comparison operators", "Understand operator precedence"], "html": "<h3>Learning Objectives</h3>\n<p>By the end of this chapter you will be able to:</p>\n<ul>\n<li>Use all arithmetic operators.</li>\n<li>Understand integer division and modulo.</li>\n<li>Use comparison operators.</li>\n<li>Understand operator precedence.</li>\n</ul>\n<hr class=\"lesson-divider\">\n<h3>8.1 Arithmetic Operators</h3>\n<div class=\"table-wrap\"><table>\n<tr><th>Operator</th><th>Symbol</th><th>Example</th><th>Result</th></tr>\n<tr><td>Addition</td><td><code>+</code></td><td><code>3 + 2</code></td><td><code>5</code></td></tr>\n<tr><td>Subtraction</td><td><code>-</code></td><td><code>3 - 2</code></td><td><code>1</code></td></tr>\n<tr><td>Multiplication</td><td><code>*</code></td><td><code>3 * 2</code></td><td><code>6</code></td></tr>\n<tr><td>Division</td><td><code>/</code></td><td><code>7 / 2</code></td><td><code>3.5</code></td></tr>\n<tr><td>Floor division</td><td><code>//</code></td><td><code>7 // 2</code></td><td><code>3</code></td></tr>\n<tr><td>Modulo</td><td><code>%</code></td><td><code>7 % 2</code></td><td><code>1</code></td></tr>\n<tr><td>Exponentiation</td><td><code>**</code></td><td><code>2 ** 8</code></td><td><code>256</code></td></tr>\n</table></div>\n<p>Division in Python 3 always returns a float. <code>7 / 2</code> is <code>3.5</code>, not <code>3</code>.</p>\n<p><strong>Floor division</strong> (<code>//</code>) divides and rounds <strong>down</strong> to the nearest integer:</p>\n<div class=\"code-block\"><pre class=\"code-content\">print(7 // 2)     # 3\nprint(-7 // 2)    # -4 (rounds down, not toward zero)</pre></div>\n<p><strong>Modulo</strong> (<code>%</code>) gives the <strong>remainder</strong> after division:</p>\n<div class=\"code-block\"><pre class=\"code-content\">print(7 % 2)      # 1   (7 = 3\u00d72 + 1)\nprint(10 % 3)     # 1   (10 = 3\u00d73 + 1)\nprint(12 % 4)     # 0   (12 = 3\u00d74 + 0)</pre></div>\n<p>Modulo is surprisingly useful. To check if a number is even: <code>n % 2 == 0</code>.</p>\n<hr class=\"lesson-divider\">\n<h3>8.2 Operator Precedence</h3>\n<p>Python follows the standard mathematical order of operations (BODMAS / PEMDAS):</p>\n<ol>\n<li>Parentheses <code>()</code></li>\n<li>Exponentiation <code>**</code></li>\n<li>Multiplication, Division, Floor division, Modulo <code>* / // %</code></li>\n<li>Addition, Subtraction <code>+ -</code></li>\n</ol>\n<div class=\"code-block\"><pre class=\"code-content\">result = 2 + 3 * 4      # 14 (not 20 \u2014 multiplication first)\nresult = (2 + 3) * 4    # 20 (parentheses first)\nresult = 2 ** 3 ** 2    # 512 (exponentiation is right-associative: 2^(3^2) = 2^9)</pre></div>\n<p><strong>Rule of thumb:</strong> when in doubt, use parentheses to make your intention explicit.</p>\n<hr class=\"lesson-divider\">\n<h3>8.3 Comparison Operators</h3>\n<p>Comparison operators compare two values and return a Boolean (<code>True</code> or <code>False</code>).</p>\n<div class=\"table-wrap\"><table>\n<tr><th>Operator</th><th>Meaning</th><th>Example</th><th>Result</th></tr>\n<tr><td><code>==</code></td><td>Equal to</td><td><code>5 == 5</code></td><td><code>True</code></td></tr>\n<tr><td><code>!=</code></td><td>Not equal to</td><td><code>5 != 3</code></td><td><code>True</code></td></tr>\n<tr><td><code><</code></td><td>Less than</td><td><code>3 < 5</code></td><td><code>True</code></td></tr>\n<tr><td><code>></code></td><td>Greater than</td><td><code>5 > 3</code></td><td><code>True</code></td></tr>\n<tr><td><code><=</code></td><td>Less than or equal</td><td><code>3 <= 3</code></td><td><code>True</code></td></tr>\n<tr><td><code>>=</code></td><td>Greater than or equal</td><td><code>4 >= 5</code></td><td><code>False</code></td></tr>\n</table></div>\n<p><strong>Important:</strong> <code>==</code> tests equality. <code>=</code> assigns a value. They are completely different.</p>\n<div class=\"code-block\"><pre class=\"code-content\">speed = 250\n\nprint(speed == 250)    # True\nprint(speed &gt; 300)     # False\nprint(speed &lt;= 250)    # True</pre></div>\n<hr class=\"lesson-divider\">\n<h3>8.4 Practical Operators Example</h3>\n<div class=\"code-block\"><pre class=\"code-content\"># Lift equation: L = 0.5 \u00d7 \u03c1 \u00d7 v\u00b2 \u00d7 CL \u00d7 S\n# Determine if aircraft can sustain level flight\n\nrho = 1.225       # Air density at sea level, kg/m\u00b3\nv = 80.0          # Airspeed, m/s\nCL = 1.2          # Lift coefficient\nS = 122.6         # Wing area, m\u00b2\nweight_n = 75000  # Aircraft weight, N\n\n# Calculate lift\nlift_n = 0.5 * rho * v**2 * CL * S\n\nprint(f\"Airspeed:      {v} m/s\")\nprint(f\"Lift:          {lift_n:.0f} N\")\nprint(f\"Weight:        {weight_n} N\")\nprint(f\"Lift &gt; Weight: {lift_n &gt; weight_n}\")</pre></div>\n<hr class=\"lesson-divider\">\n<h3>8.5 Integer Division and Modulo Together</h3>\n<p>A classic use case: converting seconds to hours, minutes, and seconds.</p>\n<div class=\"code-block\"><pre class=\"code-content\">total_seconds = 9385   # e.g., a flight segment duration\n\nhours = total_seconds // 3600        # How many complete hours?\nremainder = total_seconds % 3600     # Leftover seconds after extracting hours\nminutes = remainder // 60            # How many complete minutes?\nseconds = remainder % 60             # Leftover seconds\n\nprint(f\"Duration: {hours}h {minutes}m {seconds}s\")</pre></div>\n<p><strong>Output:</strong></p>\n<div class=\"code-block\"><pre class=\"code-content\">Duration: 2h 36m 25s</pre></div>\n<hr class=\"lesson-divider\">", "code": "print(7 // 2)     # 3\nprint(-7 // 2)    # -4 (rounds down, not toward zero)"}, "9": {"title": "Strings", "subtitle": "Working with text in Python", "objectives": ["Create and manipulate strings", "Use common string methods", "Slice strings", "Format strings with f-strings (advanced techniques)"], "html": "<h3>Learning Objectives</h3>\n<p>By the end of this chapter you will be able to:</p>\n<ul>\n<li>Create and manipulate strings.</li>\n<li>Use common string methods.</li>\n<li>Slice strings.</li>\n<li>Format strings with f-strings (advanced techniques).</li>\n<li>Use escape characters.</li>\n</ul>\n<hr class=\"lesson-divider\">\n<h3>9.1 Strings Revisited</h3>\n<p>A <strong>string</strong> is an ordered sequence of characters. Python strings are <strong>immutable</strong> \u2014 once created, they cannot be changed in place. When you \"modify\" a string, Python creates a new string.</p>\n<div class=\"code-block\"><pre class=\"code-content\">greeting = \"Hello, World!\"\n\nprint(len(greeting))       # 13 \u2014 number of characters\nprint(greeting[0])         # 'H' \u2014 first character\nprint(greeting[-1])        # '!' \u2014 last character\nprint(greeting[7:12])      # 'World' \u2014 a slice</pre></div>\n<hr class=\"lesson-divider\">\n<h3>9.2 Creating Strings</h3>\n<div class=\"code-block\"><pre class=\"code-content\">single = 'Hello'\ndouble = \"Hello\"           # Equivalent to single quotes\nmulti = \"\"\"This is a\nmulti-line string.\"\"\"      # Triple quotes allow line breaks\n\n# Strings with quotes inside\nquote1 = \"She said, 'Hello.'\"     # Single quote inside double\nquote2 = 'He replied, \"Hi.\"'      # Double quote inside single</pre></div>\n<hr class=\"lesson-divider\">\n<h3>9.3 Escape Characters</h3>\n<p>An <strong>escape character</strong> is a backslash <code>\\</code> followed by a letter, which represents a special character:</p>\n<div class=\"table-wrap\"><table>\n<tr><th>Escape</th><th>Meaning</th></tr>\n<tr><td><code>\\n</code></td><td>Newline (move to next line)</td></tr>\n<tr><td><code>\\t</code></td><td>Tab (horizontal indent)</td></tr>\n<tr><td><code>\\\\</code></td><td>Literal backslash</td></tr>\n<tr><td><code>\\'</code></td><td>Literal single quote</td></tr>\n<tr><td><code>\\\"</code></td><td>Literal double quote</td></tr>\n</table></div>\n<div class=\"code-block\"><pre class=\"code-content\">print(\"Line one\\nLine two\\nLine three\")\nprint(\"Name:\\tAnimesh\")\nprint(\"File path: C:\\\\Users\\\\Animesh\")</pre></div>\n<hr class=\"lesson-divider\">\n<h3>9.4 String Indexing</h3>\n<p>Each character in a string has an <strong>index</strong> \u2014 a position number. Python indices start at <strong>0</strong> (not 1).</p>\n<div class=\"code-block\"><pre class=\"code-content\">s = \"Python\"\n     P  y  t  h  o  n\n     0  1  2  3  4  5    (forward index)\n    -6 -5 -4 -3 -2 -1    (reverse index)</pre></div>\n<div class=\"code-block\"><pre class=\"code-content\">s = \"Python\"\nprint(s[0])    # 'P'\nprint(s[5])    # 'n'\nprint(s[-1])   # 'n' (last character)\nprint(s[-2])   # 'o'</pre></div>\n<hr class=\"lesson-divider\">\n<h3>9.5 String Slicing</h3>\n<p><strong>Slicing</strong> extracts a portion of a string: <code>s[start:stop:step]</code></p>\n<ul>\n<li><code>start</code>: index to begin (inclusive)</li>\n<li><code>stop</code>: index to end (exclusive \u2014 the character at this index is NOT included)</li>\n<li><code>step</code>: how many characters to skip (default 1)</li>\n</ul>\n<div class=\"code-block\"><pre class=\"code-content\">s = \"Engineering\"\n#    0123456789...\n\nprint(s[0:3])     # 'Eng'\nprint(s[3:7])     # 'inee'\nprint(s[:3])      # 'Eng' (start defaults to 0)\nprint(s[7:])      # 'ing' (end defaults to end of string)\nprint(s[:])       # 'Engineering' (entire string)\nprint(s[::2])     # 'Enierng' (every second character)\nprint(s[::-1])    # 'gnireenignE' (reversed)</pre></div>\n<hr class=\"lesson-divider\">\n<h3>9.6 String Methods</h3>\n<p>String <strong>methods</strong> are built-in functions that operate on strings. Call them with dot notation: <code>string.method()</code>.</p>\n<div class=\"code-block\"><pre class=\"code-content\">text = \"  Hello, World!  \"\n\n# Case methods\nprint(text.upper())          # \"  HELLO, WORLD!  \"\nprint(text.lower())          # \"  hello, world!  \"\nprint(text.title())          # \"  Hello, World!  \"\n\n# Whitespace\nprint(text.strip())          # \"Hello, World!\" (removes leading/trailing spaces)\nprint(text.lstrip())         # \"Hello, World!  \" (left only)\nprint(text.rstrip())         # \"  Hello, World!\" (right only)\n\n# Searching\ntext = \"the aircraft is airborne\"\nprint(text.find(\"air\"))      # 4 (index of first occurrence)\nprint(text.count(\"air\"))     # 2 (number of occurrences)\nprint(text.startswith(\"the\"))  # True\nprint(text.endswith(\"borne\"))  # True\n\n# Replacing\nprint(text.replace(\"aircraft\", \"helicopter\"))\n\n# Splitting\nsentence = \"Paris,London,Dubai,Sydney\"\ncities = sentence.split(\",\")    # ['Paris', 'London', 'Dubai', 'Sydney']\nprint(cities)\n\n# Joining\njoined = \" | \".join(cities)    # 'Paris | London | Dubai | Sydney'\nprint(joined)\n\n# Checking content\nprint(\"42\".isdigit())    # True\nprint(\"ABC\".isalpha())   # True\nprint(\"  \".isspace())    # True</pre></div>\n<hr class=\"lesson-divider\">\n<h3>9.7 String Concatenation and Repetition</h3>\n<div class=\"code-block\"><pre class=\"code-content\">first_name = \"Ada\"\nlast_name = \"Lovelace\"\n\nfull_name = first_name + \" \" + last_name    # Concatenation\nprint(full_name)   # Ada Lovelace\n\nseparator = \"-\" * 30    # Repetition\nprint(separator)   # ------------------------------</pre></div>\n<hr class=\"lesson-divider\">\n<h3>9.8 f-Strings: Advanced Techniques</h3>\n<div class=\"code-block\"><pre class=\"code-content\">name = \"Airbus A320\"\nrange_nm = 3300\npassengers = 180\n\n# Basic embedding\nprint(f\"The {name} carries {passengers} passengers over {range_nm} nm.\")\n\n# Expressions\nprint(f\"Range in km: {range_nm * 1.852:.0f}\")\n\n# Calling methods inside f-strings\nraw = \"  airbus a320  \"\nprint(f\"Cleaned: {raw.strip().title()}\")\n\n# Padding and alignment\nfor aircraft, pax in [(\"A320\", 180), (\"A330\", 300), (\"A380\", 555)]:\n    print(f\"{aircraft:&lt;8} {pax:&gt;5} passengers\")</pre></div>\n<hr class=\"lesson-divider\">\n<h3>9.9 The in Operator with Strings</h3>\n<div class=\"code-block\"><pre class=\"code-content\">message = \"Engine 1 fire warning\"\n\nprint(\"fire\" in message)      # True\nprint(\"smoke\" in message)     # False\nprint(\"Engine\" in message)    # True</pre></div>\n<hr class=\"lesson-divider\">\n<h3>9.10 Practical Example: Text Report Generator</h3>", "code": "greeting = \"Hello, World!\"\n\nprint(len(greeting))       # 13 \u2014 number of characters\nprint(greeting[0])         # 'H' \u2014 first character\nprint(greeting[-1])        # '!' \u2014 last character\nprint(greeting[7:12])      # 'World' \u2014 a slice"}, "10": {"title": "Lists", "subtitle": "Storing multiple values in one place", "objectives": ["Create and use lists", "Add, remove, and update items", "Use list methods", "Iterate over a list"], "html": "<h3>Learning Objectives</h3>\n<p>By the end of this chapter you will be able to:</p>\n<ul>\n<li>Create and use lists.</li>\n<li>Add, remove, and update items.</li>\n<li>Use list methods.</li>\n<li>Iterate over a list.</li>\n<li>Understand lists of mixed types and nested lists.</li>\n</ul>\n<hr class=\"lesson-divider\">\n<h3>10.1 The Problem Lists Solve</h3>\n<p>Suppose you want to store the names of ten airports. Without lists, you would need ten separate variables:</p>\n<div class=\"code-block\"><pre class=\"code-content\">airport1 = \"LHR\"\nairport2 = \"CDG\"\nairport3 = \"DXB\"\n# ...and so on</pre></div>\n<p>This is unmanageable. Lists solve this by storing multiple values in a single, ordered container.</p>\n<hr class=\"lesson-divider\">\n<h3>10.2 Creating a List</h3>\n<p>A <strong>list</strong> is an ordered, mutable (changeable) collection of items, enclosed in square brackets.</p>\n<div class=\"code-block\"><pre class=\"code-content\">airports = [\"LHR\", \"CDG\", \"DXB\", \"JFK\", \"SIN\"]\naltitudes = [0, 5000, 10000, 20000, 35000]\nmixed = [\"A320\", 180, 3300.0, True]    # Lists can hold mixed types\n\nempty_list = []    # An empty list</pre></div>\n<hr class=\"lesson-divider\">\n<h3>10.3 Indexing and Slicing</h3>\n<p>Lists use the same indexing rules as strings:</p>\n<div class=\"code-block\"><pre class=\"code-content\">airports = [\"LHR\", \"CDG\", \"DXB\", \"JFK\", \"SIN\"]\n\nprint(airports[0])     # \"LHR\"\nprint(airports[-1])    # \"SIN\"\nprint(airports[1:3])   # [\"CDG\", \"DXB\"]\nprint(airports[::-1])  # Reversed list</pre></div>\n<hr class=\"lesson-divider\">\n<h3>10.4 Modifying Lists</h3>\n<p>Unlike strings, <strong>lists are mutable</strong> \u2014 you can change their contents.</p>\n<div class=\"code-block\"><pre class=\"code-content\">altitudes = [0, 5000, 10000, 20000, 35000]\n\n# Change an element\naltitudes[0] = 500\nprint(altitudes)    # [500, 5000, 10000, 20000, 35000]\n\n# Change a slice\naltitudes[1:3] = [6000, 12000]\nprint(altitudes)    # [500, 6000, 12000, 20000, 35000]</pre></div>\n<hr class=\"lesson-divider\">\n<h3>10.5 List Methods</h3>\n<div class=\"code-block\"><pre class=\"code-content\">aircraft_list = [\"A320\", \"A330\", \"B737\"]\n\n# Adding items\naircraft_list.append(\"B787\")           # Add to the end\naircraft_list.insert(1, \"A220\")        # Insert at index 1\naircraft_list.extend([\"E190\", \"ATR72\"])  # Add multiple items\n\nprint(aircraft_list)\n\n# Removing items\naircraft_list.remove(\"B737\")           # Remove first occurrence of \"B737\"\npopped = aircraft_list.pop()           # Remove and return last item\npopped_at = aircraft_list.pop(0)       # Remove and return item at index 0\n\n# Searching\nprint(\"A320\" in aircraft_list)         # True or False\nprint(aircraft_list.index(\"A330\"))     # Index of \"A330\"\nprint(aircraft_list.count(\"A320\"))     # How many times \"A320\" appears\n\n# Sorting\nnumbers = [5, 2, 8, 1, 9, 3]\nnumbers.sort()                         # Sort in place (modifies the list)\nprint(numbers)                         # [1, 2, 3, 5, 8, 9]\n\nnumbers.sort(reverse=True)             # Sort descending\nprint(numbers)                         # [9, 8, 5, 3, 2, 1]\n\n# Non-destructive sort\noriginal = [5, 2, 8, 1]\nsorted_copy = sorted(original)         # Returns a new sorted list\nprint(original)                        # [5, 2, 8, 1] \u2014 unchanged\nprint(sorted_copy)                     # [1, 2, 5, 8]\n\n# Other\nprint(len(aircraft_list))             # Number of items\naircraft_list.reverse()               # Reverse in place\naircraft_list.clear()                 # Remove all items</pre></div>\n<hr class=\"lesson-divider\">\n<h3>10.6 Iterating Over a List</h3>\n<p>The most common way to process every item in a list is the <code>for</code> loop (covered fully in Chapter 16). Here is a preview:</p>\n<div class=\"code-block\"><pre class=\"code-content\">waypoints = [\"EGLL\", \"LFPG\", \"LMML\", \"HECA\", \"OMDB\"]\n\nfor waypoint in waypoints:\n    print(f\"Overflying: {waypoint}\")</pre></div>\n<p><strong>Output:</strong></p>\n<div class=\"code-block\"><pre class=\"code-content\">Overflying: EGLL\nOverflying: LFPG\nOverflying: LMML\nOverflying: HECA\nOverflying: OMDB</pre></div>\n<hr class=\"lesson-divider\">\n<h3>10.7 Useful List Functions</h3>\n<div class=\"code-block\"><pre class=\"code-content\">values = [23, 55, 12, 88, 41]\n\nprint(len(values))      # 5\nprint(min(values))      # 12\nprint(max(values))      # 88\nprint(sum(values))      # 219\nprint(sum(values) / len(values))   # 43.8 \u2014 average</pre></div>\n<hr class=\"lesson-divider\">\n<h3>10.8 Nested Lists (Lists of Lists)</h3>\n<p>A list can contain other lists \u2014 this is called a <strong>nested list</strong> and is useful for tables and matrices.</p>\n<div class=\"code-block\"><pre class=\"code-content\"># A 3\u00d73 matrix\nmatrix = [\n    [1, 2, 3],\n    [4, 5, 6],\n    [7, 8, 9]\n]\n\nprint(matrix[0])       # [1, 2, 3] \u2014 first row\nprint(matrix[1][2])    # 6 \u2014 row 1, column 2</pre></div>\n<hr class=\"lesson-divider\">\n<h3>10.9 Practical Example: Flight Data Analysis</h3>\n<div class=\"code-block\"><pre class=\"code-content\"># Analyse a sequence of altitude readings (in feet)\n\naltitudes = [0, 5000, 15000, 28000, 35000, 35000, 32000, 20000, 8000, 2000, 0]\n\nprint(\"=== Flight Altitude Analysis ===\")\nprint(f\"Data points:    {len(altitudes)}\")\nprint(f\"Max altitude:   {max(altitudes):,} ft\")\nprint(f\"Min altitude:   {min(altitudes):,} ft\")\nprint(f\"Average:        {sum(altitudes)/len(altitudes):,.0f} ft\")\n\n# Count time above cruise altitude threshold\ncruise_threshold = 30000\nabove_cruise = [alt for alt in altitudes if alt &gt;= cruise_threshold]\nprint(f\"Readings at or above {cruise_threshold:,} ft: {len(above_cruise)}\")</pre></div>\n<hr class=\"lesson-divider\">", "code": "airport1 = \"LHR\"\nairport2 = \"CDG\"\nairport3 = \"DXB\"\n# ...and so on"}, "11": {"title": "Tuples", "subtitle": "Immutable ordered sequences", "objectives": ["Create and use tuples", "Understand the difference between tuples and lists", "Unpack tuples", "Recognise when to use a tuple over a list"], "html": "<h3>Learning Objectives</h3>\n<p>By the end of this chapter you will be able to:</p>\n<ul>\n<li>Create and use tuples.</li>\n<li>Understand the difference between tuples and lists.</li>\n<li>Unpack tuples.</li>\n<li>Recognise when to use a tuple over a list.</li>\n</ul>\n<hr class=\"lesson-divider\">\n<h3>11.1 What Is a Tuple?</h3>\n<p>A <strong>tuple</strong> is an ordered, <strong>immutable</strong> sequence of items. Like a list, it holds multiple values in order. Unlike a list, it cannot be changed after creation.</p>\n<div class=\"code-block\"><pre class=\"code-content\">coordinates = (51.477, -0.461)    # Lat/lon of Heathrow\nengines = (\"CFM56\", \"V2500\")\nrgb_red = (255, 0, 0)\nsingle = (42,)                    # Single-element tuple \u2014 note the comma!\nempty = ()</pre></div>\n<p><strong>Why does <code>(42,)</code> need a trailing comma?</strong> Without it, Python interprets <code>(42)</code> as just the number <code>42</code> in parentheses. The comma is what makes it a tuple.</p>\n<hr class=\"lesson-divider\">\n<h3>11.2 Accessing Tuple Elements</h3>\n<p>Indexing and slicing work exactly as with lists and strings:</p>\n<div class=\"code-block\"><pre class=\"code-content\">airport = (\"Heathrow\", \"LHR\", \"EGLL\", 83.4)   # name, IATA, ICAO, annual movements (millions)\n\nprint(airport[0])     # \"Heathrow\"\nprint(airport[-1])    # 83.4\nprint(airport[1:3])   # (\"LHR\", \"EGLL\")</pre></div>\n<hr class=\"lesson-divider\">\n<h3>11.3 Attempting to Modify a Tuple</h3>\n<div class=\"code-block\"><pre class=\"code-content\">point = (3, 5)\npoint[0] = 10    # TypeError: 'tuple' object does not support item assignment</pre></div>\n<p>This immutability is intentional and useful \u2014 it protects data that should not change.</p>\n<hr class=\"lesson-divider\">\n<h3>11.4 Tuple Unpacking</h3>\n<p>Tuple <strong>unpacking</strong> assigns the elements of a tuple to separate variables in one step:</p>\n<div class=\"code-block\"><pre class=\"code-content\">coordinates = (51.477, -0.461)\nlatitude, longitude = coordinates    # Unpack into two variables\n\nprint(f\"Latitude:  {latitude}\u00b0\")\nprint(f\"Longitude: {longitude}\u00b0\")</pre></div>\n<p>This also works without explicit tuples:</p>\n<div class=\"code-block\"><pre class=\"code-content\">x, y, z = 1, 2, 3    # Python treats the right side as a tuple</pre></div>\n<p>Swapping variables using tuple unpacking:</p>\n<div class=\"code-block\"><pre class=\"code-content\">a = \"North\"\nb = \"South\"\na, b = b, a    # Swap in one line\nprint(a, b)    # South North</pre></div>\n<hr class=\"lesson-divider\">\n<h3>11.5 When to Use a Tuple vs a List</h3>\n<div class=\"table-wrap\"><table>\n<tr><th>Feature</th><th>List</th><th>Tuple</th></tr>\n<tr><td>Mutable?</td><td>Yes</td><td>No</td></tr>\n<tr><td>Syntax</td><td><code>[1, 2, 3]</code></td><td><code>(1, 2, 3)</code></td></tr>\n<tr><td>Speed</td><td>Slightly slower</td><td>Slightly faster</td></tr>\n<tr><td>Hashable?</td><td>No</td><td>Yes (if elements are hashable)</td></tr>\n</table></div>\n<p>Use a <strong>tuple</strong> when:</p>\n<ul>\n<li>The data should not change (coordinates, RGB colours, database records).</li>\n<li>You want to return multiple values from a function.</li>\n<li>You want to use the collection as a dictionary key (requires hashability \u2014 covered in Chapter 13).</li>\n</ul>\n<p>Use a <strong>list</strong> when the data needs to be modified.</p>\n<hr class=\"lesson-divider\">\n<h3>11.6 Practical Example</h3>\n<div class=\"code-block\"><pre class=\"code-content\"># Waypoint database \u2014 each waypoint is a tuple of (name, lat, lon, altitude_ft)\nwaypoints = [\n    (\"EGLL\", 51.477, -0.461, 0),\n    (\"LFPG\", 49.013, 2.550, 0),\n    (\"LMML\", 35.857, 14.477, 0),\n]\n\nfor name, lat, lon, alt in waypoints:   # Unpack each tuple\n    print(f\"{name}: Lat {lat:.3f}, Lon {lon:.3f}\")</pre></div>\n<hr class=\"lesson-divider\">", "code": "coordinates = (51.477, -0.461)    # Lat/lon of Heathrow\nengines = (\"CFM56\", \"V2500\")\nrgb_red = (255, 0, 0)\nsingle = (42,)                    # Single-element tuple \u2014 note the comma!\nempty = ()"}, "12": {"title": "Sets", "subtitle": "Unordered collections of unique values", "objectives": ["Create and use sets", "Perform set operations: union, intersection, difference", "Understand when sets are useful"], "html": "<h3>Learning Objectives</h3>\n<p>By the end of this chapter you will be able to:</p>\n<ul>\n<li>Create and use sets.</li>\n<li>Perform set operations: union, intersection, difference.</li>\n<li>Understand when sets are useful.</li>\n</ul>\n<hr class=\"lesson-divider\">\n<h3>12.1 What Is a Set?</h3>\n<p>A <strong>set</strong> is an unordered collection of <strong>unique</strong> elements. Sets automatically remove duplicates.</p>\n<div class=\"code-block\"><pre class=\"code-content\">countries = {\"UK\", \"France\", \"Germany\", \"UK\", \"France\"}\nprint(countries)    # {'UK', 'France', 'Germany'} \u2014 duplicates removed, order may vary</pre></div>\n<p>Sets do not preserve insertion order. You cannot access elements by index.</p>\n<hr class=\"lesson-divider\">\n<h3>12.2 Creating Sets</h3>\n<div class=\"code-block\"><pre class=\"code-content\"># Using curly braces\nvisited = {\"LHR\", \"CDG\", \"DXB\"}\n\n# From a list (removes duplicates)\nraw = [\"A320\", \"B737\", \"A320\", \"A330\", \"B737\"]\nunique_types = set(raw)\nprint(unique_types)   # {'A320', 'B737', 'A330'}\n\n# Empty set \u2014 must use set(), not {} (which creates an empty dict)\nempty = set()</pre></div>\n<hr class=\"lesson-divider\">\n<h3>12.3 Set Operations</h3>\n<p>Sets support mathematical set operations:</p>\n<div class=\"code-block\"><pre class=\"code-content\">fleet_1 = {\"A320\", \"A330\", \"A380\"}\nfleet_2 = {\"B737\", \"B777\", \"A320\"}\n\n# Union \u2014 all types in either fleet\nprint(fleet_1 | fleet_2)          # {'A320', 'A330', 'A380', 'B737', 'B777'}\n\n# Intersection \u2014 types in both fleets\nprint(fleet_1 &amp; fleet_2)          # {'A320'}\n\n# Difference \u2014 in fleet_1 but not fleet_2\nprint(fleet_1 - fleet_2)          # {'A330', 'A380'}\n\n# Symmetric difference \u2014 in one but not both\nprint(fleet_1 ^ fleet_2)          # {'A330', 'A380', 'B737', 'B777'}</pre></div>\n<hr class=\"lesson-divider\">\n<h3>12.4 Set Methods</h3>\n<div class=\"code-block\"><pre class=\"code-content\">airports = {\"LHR\", \"CDG\", \"DXB\"}\n\nairports.add(\"JFK\")             # Add one element\nairports.discard(\"CDG\")         # Remove (no error if not present)\nairports.remove(\"DXB\")          # Remove (raises error if not present)\n\nprint(\"LHR\" in airports)        # True \u2014 fast membership testing\nprint(len(airports))            # Number of elements</pre></div>\n<p><strong>Membership testing</strong> in a set is very fast (much faster than in a list), because sets use a data structure called a hash table.</p>\n<hr class=\"lesson-divider\">\n<h3>12.5 Practical: Remove Duplicates</h3>\n<div class=\"code-block\"><pre class=\"code-content\"># A sensor recorded some temperature readings with duplicates\nreadings = [20.1, 20.3, 20.1, 20.5, 20.3, 20.7, 20.5]\n\nunique_readings = sorted(set(readings))   # Remove duplicates and sort\nprint(unique_readings)   # [20.1, 20.3, 20.5, 20.7]</pre></div>\n<hr class=\"lesson-divider\">", "code": "countries = {\"UK\", \"France\", \"Germany\", \"UK\", \"France\"}\nprint(countries)    # {'UK', 'France', 'Germany'} \u2014 duplicates removed, order may vary"}, "13": {"title": "Dictionaries", "subtitle": "Key-value pairs", "objectives": ["Create and use dictionaries", "Access, add, update, and delete entries", "Iterate over dictionaries", "Use common dictionary methods"], "html": "<h3>Learning Objectives</h3>\n<p>By the end of this chapter you will be able to:</p>\n<ul>\n<li>Create and use dictionaries.</li>\n<li>Access, add, update, and delete entries.</li>\n<li>Iterate over dictionaries.</li>\n<li>Use common dictionary methods.</li>\n</ul>\n<hr class=\"lesson-divider\">\n<h3>13.1 The Problem Dictionaries Solve</h3>\n<p>A list stores values by position. To look up a person's phone number in a list, you need to know their position. A <strong>dictionary</strong> stores values by a named key \u2014 much more natural.</p>\n<p>A dictionary is a collection of <strong>key-value pairs</strong>. Think of it as a real dictionary: you look up a word (key) to find its definition (value).</p>\n<hr class=\"lesson-divider\">\n<h3>13.2 Creating a Dictionary</h3>\n<div class=\"code-block\"><pre class=\"code-content\"># Create a dictionary with curly braces: {key: value, key: value}\naircraft_specs = {\n    \"type\": \"Airbus A320-214\",\n    \"max_passengers\": 180,\n    \"range_nm\": 3300,\n    \"engines\": 2,\n    \"cruise_mach\": 0.78\n}</pre></div>\n<p>Keys must be <strong>unique</strong> and <strong>immutable</strong> (strings, numbers, or tuples). Values can be anything.</p>\n<hr class=\"lesson-divider\">\n<h3>13.3 Accessing Values</h3>\n<div class=\"code-block\"><pre class=\"code-content\">print(aircraft_specs[\"type\"])           # \"Airbus A320-214\"\nprint(aircraft_specs[\"max_passengers\"]) # 180\n\n# Safe access \u2014 returns None (or a default) if key doesn't exist\nprint(aircraft_specs.get(\"wingspan\"))   # None\nprint(aircraft_specs.get(\"wingspan\", \"Unknown\"))  # \"Unknown\"</pre></div>\n<p><strong>Always use <code>.get()</code> when you are not sure the key exists</strong>, to avoid a <code>KeyError</code>.</p>\n<hr class=\"lesson-divider\">\n<h3>13.4 Modifying Dictionaries</h3>\n<div class=\"code-block\"><pre class=\"code-content\">specs = {\"type\": \"A320\", \"engines\": 2}\n\n# Add or update\nspecs[\"range_nm\"] = 3300        # Add new key\nspecs[\"engines\"] = 2            # Update existing key (same value here)\nspecs.update({\"cruise_mach\": 0.78, \"passengers\": 180})   # Add/update multiple\n\n# Delete\ndel specs[\"engines\"]            # Delete a key\nremoved = specs.pop(\"range_nm\") # Delete and return the value</pre></div>\n<hr class=\"lesson-divider\">\n<h3>13.5 Iterating Over Dictionaries</h3>\n<div class=\"code-block\"><pre class=\"code-content\">specs = {\"type\": \"A320\", \"range_nm\": 3300, \"passengers\": 180}\n\n# Iterate over keys (default)\nfor key in specs:\n    print(key)\n\n# Iterate over values\nfor value in specs.values():\n    print(value)\n\n# Iterate over key-value pairs (most common)\nfor key, value in specs.items():\n    print(f\"{key}: {value}\")</pre></div>\n<hr class=\"lesson-divider\">\n<h3>13.6 Useful Dictionary Methods</h3>\n<div class=\"code-block\"><pre class=\"code-content\">specs = {\"type\": \"A320\", \"range\": 3300, \"pax\": 180}\n\nprint(specs.keys())     # dict_keys(['type', 'range', 'pax'])\nprint(specs.values())   # dict_values(['A320', 3300, 180])\nprint(specs.items())    # dict_items([('type', 'A320'), ...])\nprint(len(specs))       # 3\nprint(\"type\" in specs)  # True \u2014 membership test on keys\nspecs.clear()           # Remove all items</pre></div>\n<hr class=\"lesson-divider\">\n<h3>13.7 Nested Dictionaries</h3>\n<div class=\"code-block\"><pre class=\"code-content\"># A fleet represented as a dictionary of dictionaries\nfleet = {\n    \"G-ABCD\": {\n        \"type\": \"A320-214\",\n        \"hours\": 23472,\n        \"cycles\": 18641\n    },\n    \"G-EFGH\": {\n        \"type\": \"A330-200\",\n        \"hours\": 41200,\n        \"cycles\": 9800\n    }\n}\n\n# Access nested values\nprint(fleet[\"G-ABCD\"][\"type\"])    # \"A320-214\"\nprint(fleet[\"G-EFGH\"][\"hours\"])   # 41200\n\n# Iterate over fleet\nfor reg, data in fleet.items():\n    print(f\"{reg}: {data['type']}, {data['hours']:,} hours\")</pre></div>\n<hr class=\"lesson-divider\">\n<h3>13.8 Practical: Configuration Store</h3>\n<div class=\"code-block\"><pre class=\"code-content\"># Store and retrieve aircraft performance parameters\n\ndef get_performance(aircraft_type):\n    \"\"\"Return performance data for a given aircraft type.\"\"\"\n    database = {\n        \"A320-214\": {\"mto_kg\": 78000, \"cruise_mach\": 0.78, \"range_nm\": 3300},\n        \"A330-200\": {\"mto_kg\": 230000, \"cruise_mach\": 0.82, \"range_nm\": 6350},\n        \"B737-800\": {\"mto_kg\": 79016, \"cruise_mach\": 0.785, \"range_nm\": 3115},\n    }\n    return database.get(aircraft_type, None)\n\nresult = get_performance(\"A320-214\")\nif result:\n    print(f\"MTOW: {result['mto_kg']:,} kg\")\n    print(f\"Range: {result['range_nm']} nm\")\nelse:\n    print(\"Aircraft type not found.\")</pre></div>\n<hr class=\"lesson-divider\">", "code": "# Create a dictionary with curly braces: {key: value, key: value}\naircraft_specs = {\n    \"type\": \"Airbus A320-214\",\n    \"max_passengers\": 180,\n    \"range_nm\": 3300,\n    \"engines\": 2,\n    \"cruise_mach\": 0.78\n}"}, "14": {"title": "Boolean Logic", "subtitle": "True, False, and logical operators", "objectives": ["Use `and`, `or`, and `not` operators", "Understand truthiness", "Combine multiple conditions", "Use short-circuit evaluation"], "html": "<h3>Learning Objectives</h3>\n<p>By the end of this chapter you will be able to:</p>\n<ul>\n<li>Use <code>and</code>, <code>or</code>, and <code>not</code> operators.</li>\n<li>Understand truthiness.</li>\n<li>Combine multiple conditions.</li>\n<li>Use short-circuit evaluation.</li>\n</ul>\n<hr class=\"lesson-divider\">\n<h3>14.1 The Boolean Operators</h3>\n<p>Python provides three logical operators for combining conditions:</p>\n<div class=\"table-wrap\"><table>\n<tr><th>Operator</th><th>Meaning</th><th>Result</th></tr>\n<tr><td><code>and</code></td><td>Both must be True</td><td>True only if both are True</td></tr>\n<tr><td><code>or</code></td><td>Either can be True</td><td>True if at least one is True</td></tr>\n<tr><td><code>not</code></td><td>Negation</td><td>Flips True to False, False to True</td></tr>\n</table></div>\n<div class=\"code-block\"><pre class=\"code-content\">altitude = 35000\nspeed = 450\n\n# and: both conditions must be true\nprint(altitude &gt; 30000 and speed &gt; 400)    # True\nprint(altitude &gt; 30000 and speed &gt; 500)    # False\n\n# or: at least one must be true\nprint(altitude &gt; 40000 or speed &gt; 400)    # True\nprint(altitude &gt; 40000 or speed &gt; 500)    # False\n\n# not: flips the value\ngear_down = False\nprint(not gear_down)    # True (gear is NOT down, so it's up)</pre></div>\n<hr class=\"lesson-divider\">\n<h3>14.2 Truth Tables</h3>\n<p><strong>and:</strong></p>\n<div class=\"table-wrap\"><table>\n<tr><th>A</th><th>B</th><th>A and B</th></tr>\n<tr><td>True</td><td>True</td><td>True</td></tr>\n<tr><td>True</td><td>False</td><td>False</td></tr>\n<tr><td>False</td><td>True</td><td>False</td></tr>\n<tr><td>False</td><td>False</td><td>False</td></tr>\n</table></div>\n<p><strong>or:</strong></p>\n<div class=\"table-wrap\"><table>\n<tr><th>A</th><th>B</th><th>A or B</th></tr>\n<tr><td>True</td><td>True</td><td>True</td></tr>\n<tr><td>True</td><td>False</td><td>True</td></tr>\n<tr><td>False</td><td>True</td><td>True</td></tr>\n<tr><td>False</td><td>False</td><td>False</td></tr>\n</table></div>\n<hr class=\"lesson-divider\">\n<h3>14.3 Chained Comparisons</h3>\n<p>Python allows chaining comparisons naturally:</p>\n<div class=\"code-block\"><pre class=\"code-content\">altitude = 25000\n\n# These are equivalent:\nprint(20000 &lt; altitude &lt; 30000)
